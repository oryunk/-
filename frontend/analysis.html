    padding: 14px 28px;

  .btn-analyze:hover {

    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;

    text-decoration: none;
    display: inline-flex;
    align-items: center;

  .analysis-result {
    margin-top: 40px;
    min-height: 300px;
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.14);
    border-radius: 16px;

    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-400);
  }

  .analysis-result.loading {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .result-placeholder {
    text-align: center;
  }

  .result-placeholder-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .result-placeholder-text {
    font-size: 15px;
    color: var(--gray-400);
  }

  .ai-result-wrap {
    width: 100%;
    color: var(--text-primary);
  }

  .ai-result-title {
    margin-bottom: 20px;
    font-size: 22px;
    line-height: 1.4;
    color: var(--text-primary);
  }

  .ai-result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;

  .ai-result-card {
    border-radius: 12px;
    padding: 16px;
    border: 1px solid rgba(47, 143, 95, 0.16);
    background: #f7fcf9;
  }

  .ai-result-card-label {

    margin-bottom: 8px;
  }

  .ai-result-card-value {
    font-size: 24px;
    line-height: 1.35;
    font-weight: 700;
    color: var(--text-primary);
  }

  .ai-result-card-sub {
    font-size: 14px;
    margin-top: 6px;
    color: var(--gray-400);
  }

  .ai-result-card-price {
    background: rgba(79, 158, 255, 0.12);
    border-color: rgba(79, 158, 255, 0.3);
  }

  .ai-result-card-opinion {
    border-width: 2px;
  }

  .ai-result-summary {
    background: #f7fcf9;
    border: 1px solid rgba(47, 143, 95, 0.2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    font-size: 16px;
    line-height: 1.9;
    color: var(--text-primary);
    white-space: pre-wrap;
    text-align: left;
  }
  .term-hint-row {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .term-hint-chip {
    display: inline-flex;
    align-items: center;
    border: 1px solid rgba(47, 143, 95, 0.25);
    background: #f2faf6;
    color: #2d5a45;
    border-radius: 999px;
    padding: 6px 10px;

    font-weight: 700;
    text-decoration: none;
  }

  .important-line {
    display: inline;
    background-repeat: no-repeat;
    background-size: 100% 0.82em;
    background-position: 0 92%;

    box-decoration-break: clone;
    padding: 0 2px;
  }

  .important-line.brush-1,
  .important-line.brush-2,
  .important-line.brush-3,
  .important-line.brush-4 {

  }

  @media (max-width: 768px) {

<script>
  function escapeHtml(text) {
    if (text == null) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeDisplayText(raw) {
    let s = String(raw || '')
      .replace(/\r\n/g, '\n')
      .replace(/^\s+/gm, '')
      .trim();
    for (let i = 0; i < 4; i += 1) {
      if (s.length >= 6 && s.startsWith('"""') && s.endsWith('"""')) {
        s = s.slice(3, -3).trim();
        continue;
      }
      if (s.length >= 6 && s.startsWith("'''") && s.endsWith("'''")) {
        s = s.slice(3, -3).trim();
        continue;
      }
      break;
    }
    s = s.replace(/^```(?:\w+)?\s*/i, '').replace(/```$/i, '').trim();
    return s.replace(/\n{3,}/g, '\n\n').trim();
  }

  function renderImportantSummaryHtml(raw) {
    const text = normalizeDisplayText(raw);
    if (!text) return '';
    const brushClass = ['brush-1', 'brush-2', 'brush-3', 'brush-4'];
    const keywordPattern = /(매수|보유|약세|강세|목표가|리스크|위험|변동성|상승|하락|추세|저항|지지|실적|수급|거래량|현재가|%|원)/;
    const sentenceRegex = /[^.!?\n]+(?:[.!?…]+|$)/g;
    const lines = text.split('\n').map(function (line) {
      const sentences = (line.match(sentenceRegex) || [line]).map(function (s) { return s.trim(); }).filter(Boolean);
      if (!sentences.length) return '';
      const pickCount = Math.min(3, Math.max(1, Math.round(sentences.length / 3)));
      const ranked = sentences.map(function (sentence, idx) {
        let score = 0;
        if (keywordPattern.test(sentence)) score += 3;
        if (/\d/.test(sentence)) score += 2;
        if (sentence.length >= 24 && sentence.length <= 80) score += 1;
        return { idx: idx, score: score, rand: Math.random() };
      });
      ranked.sort(function (a, b) { return (b.score - a.score) || (a.rand - b.rand); });
      const selected = new Set(ranked.slice(0, pickCount).map(function (r) { return r.idx; }));
      return sentences.map(function (sentence, idx) {
        const safe = escapeHtml(sentence);
        if (!selected.has(idx)) return safe;
        const cls = brushClass[Math.floor(Math.random() * brushClass.length)];
        return '<span class="important-line ' + cls + '">' + safe + '</span>';
      }).join(' ');
    });
    return lines.join('<br>');
  }

  function renderContextTermHints(terms) {
    const list = Array.isArray(terms) ? terms : [];
    if (!list.length) return '';
    return '<div class="term-hint-row">' + list.map(function (term) {
      const q = encodeURIComponent(term);
      return '<a class="term-hint-chip" href="glossary.html?term=' + q + '">' + escapeHtml(term) + '</a>';
    }).join('') + '</div>';
  }

  // AI 분석 함수
  async function performAnalysis() {
    const stockName = document.getElementById('analysisStockInput').value.trim();
    
    if (!stockName) {
      alert('종목명을 입력해주세요.');
      return;
    }
    
    const resultContainer = document.getElementById('resultContainer');
    resultContainer.classList.add('loading');
    resultContainer.innerHTML = `
      <div class="result-placeholder">
        <div class="result-placeholder-icon">로딩</div>
        <div class="result-placeholder-text">분석 중입니다...</div>
      </div>
    `;
    
    try {
      // Flask 백엔드 API 호출
      const apiBase = window.JURIN_API_BASE || 'http://localhost:5000';
      const response = await fetch(`${apiBase}/api/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stock_name: stockName })
      });
      
      if (!response.ok) {
        throw new Error(`API 오류: ${response.statusText}`);
      }
      
      const data = await response.json();
      resultContainer.classList.remove('loading');
      
      if (data.success) {
        const finalSummary = normalizeDisplayText(data.summary);
        const summaryHtml = renderImportantSummaryHtml(finalSummary);
        // AI 분석 결과 표시
        const opinionColor = {
          '강력매수': '#00D084',
          '매수': '#4F9EFF',
          '보유': '#FFB800',
          '약세': '#FF6B6B'
        };
        
        const opinionBg = {
          '강력매수': 'rgba(0, 208, 132, 0.1)',
          '매수': 'rgba(79, 158, 255, 0.1)',
          '보유': 'rgba(255, 184, 0, 0.1)',
          '약세': 'rgba(255, 107, 107, 0.1)'
        };
        
        const color = opinionColor[data.opinion] || '#4F9EFF';
        const bg = opinionBg[data.opinion] || 'rgba(79, 158, 255, 0.05)';
        
        resultContainer.innerHTML = `
          <div class="ai-result-wrap">
            <h3 class="ai-result-title">${data.stock_name} 분석 결과</h3>
            
            <div class="ai-result-grid">
              <div class="ai-result-card ai-result-card-price">
                <div class="ai-result-card-label">현재가</div>
                <div class="ai-result-card-value">${Number(data.current_price).toLocaleString()}원</div>
                <div class="ai-result-card-sub">
                  <span style="color: ${data.change_rate >= 0 ? '#00D084' : '#FF6B6B'}; font-weight: 700;">
                    ${data.change_rate >= 0 ? '▲' : '▼'} ${Math.abs(data.change_rate).toFixed(2)}%
                  </span>
                </div>
              </div>
              
              <div class="ai-result-card ai-result-card-opinion" style="background: ${bg}; border-color: ${color};">
                <div class="ai-result-card-label">AI 투자의견</div>
                <div class="ai-result-card-value" style="color: ${color};">${data.opinion}</div>
                <div class="ai-result-card-sub">
                  목표가: ${Number(data.target_price).toLocaleString()}원
                </div>
              </div>
            </div>

            <div class="ai-result-summary">${summaryHtml || '요약 데이터를 불러오지 못했습니다.'}</div>
            ${renderContextTermHints(['PER', 'PBR', 'ROE', 'ETF', '채권', 'ELW'])}
          </div>
        `;
      } else {
        resultContainer.innerHTML = `
          <div class="result-placeholder">
            <div class="result-placeholder-icon">안내</div>
            <div class="result-placeholder-text">${data.message}</div>
          </div>
        `;
      }
      
    } catch (error) {
      resultContainer.classList.remove('loading');
      console.error('분석 오류:', error);
      resultContainer.innerHTML = `
        <div class="result-placeholder">
          <div class="result-placeholder-icon">❌</div>
          <div class="result-placeholder-text">
            분석 중 오류가 발생했습니다.<br>
            <span style="font-size: 12px; color: var(--gray-500); margin-top: 8px; display: block;">
              ${error.message || '백엔드 서버가 실행 중인지 확인해주세요.'}
            </span>
          </div>
        </div>
      `;
    }
  }
  
  // 엔터 키로도 분석 실행 가능
  document.getElementById('analysisStockInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      performAnalysis();
    }
  });

  if (window.JurinStockAutocomplete) {
    var _asIn = document.getElementById('analysisStockInput');
    if (_asIn) JurinStockAutocomplete.attachStock(_asIn, {});
  }
</script>

<script>
  const GLOSSARY_API_BASE = window.JURIN_API_BASE || 'http://localhost:5000';

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function scrollGlossaryResultIntoView() {
    const el = document.getElementById('resultContainer');
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function renderLoading() {
    const resultContainer = document.getElementById('resultContainer');
    resultContainer.classList.add('loading');
    resultContainer.innerHTML = `
      <div class="result-placeholder">
        <div class="result-placeholder-icon">로딩</div>
        <div class="result-placeholder-text">AI가 용어를 설명하고 있습니다...</div>
      </div>
    `;
    scrollGlossaryResultIntoView();
  }

  function renderError(message) {
    const resultContainer = document.getElementById('resultContainer');
    resultContainer.classList.remove('loading');
    resultContainer.innerHTML = `
      <div class="result-placeholder">
        <div class="result-placeholder-icon">❌</div>
        <div class="result-placeholder-text">${escapeHtml(message)}</div>
      </div>
    `;
    scrollGlossaryResultIntoView();
  }

  function normalizeTermAnswerText(raw) {
    let s = String(raw || '').trim();
    for (let i = 0; i < 6; i++) {
      if (s.length >= 6 && s.startsWith('"""') && s.endsWith('"""')) {
        s = s.slice(3, -3).trim();
        continue;
      }
      if (s.length >= 6 && s.startsWith("'''") && s.endsWith("'''")) {
        s = s.slice(3, -3).trim();
        continue;
      }
      break;
    }
    const fence = /^```(?:\w*)?\s*\n([\s\S]*?)\n```\s*$/;
    const fm = s.match(fence);
    if (fm) s = fm[1].trim();
    let lines = s.split('\n');
    const onlyFence = (ln) => {
      const x = ln.trim();
      return x === '"""' || x === "'''" || x === '```' || /^`{3,}$/.test(x);
    };
    while (lines.length && onlyFence(lines[0])) lines.shift();
    while (lines.length && onlyFence(lines[lines.length - 1])) lines.pop();
    s = lines.join('\n');
    for (const marker of ['\n[작성 규칙]', '\n[사용자 질문]', '\n[제목]', '\n[요약]', '\n[정의]', '\n[설명]']) {
      const idx = s.indexOf(marker);
      if (idx !== -1) s = s.slice(0, idx);
    }
    s = s.replace(/^\[정의\]\s*/i, '');
    s = s.replace(/^\[설명\]\s*/i, '');
    s = s.replace(/\*\*용어의 의미:\*\*\s*/gi, '');
    s = s.replace(/\*\*특징:\*\*\s*/gi, '');
    s = s.replace(/\*\*실제 투자 활용 예시:\*\*\s*/gi, '');
    s = s.replace(/^용어의 의미:\s*/gim, '');
    s = s.replace(/^특징:\s*/gim, '');
    s = s.replace(/^실제 투자 활용 예시:\s*/gim, '');
    s = s.replace(/^\s+/gm, '');
    return s.replace(/\n{3,}/g, '\n\n').trim();
  }

  function renderImportantSummaryHtml(raw) {
    const text = normalizeTermAnswerText(raw);
    if (!text) return '';
    const keywordPattern = /(핵심|중요|위험|주의|활용|예시|의미|지표|수익|손실|변동성|비율|목표|추세|매수|매도|보유|%|원)/;
    const sentenceRegex = /[^.!?\n]+(?:[.!?…]+|$)/g;

    const sentences = (text.match(sentenceRegex) || [])
      .map(function (s) { return s.trim(); })
      .filter(Boolean);

    let pick = '';
    for (let i = 0; i < sentences.length; i++) {
      if (keywordPattern.test(sentences[i]) && sentences[i].length >= 12) {
        pick = sentences[i];
        break;
      }
    }
    if (!pick && sentences.length) pick = sentences[0];

    const escaped = escapeHtml(text);
    if (!pick) return escaped.replace(/\n/g, '<br>');

    const safePick = escapeHtml(pick);
    const highlighted = escaped.replace(safePick, '<span class="important-line brush-2">' + safePick + '</span>');
    return highlighted.replace(/\n/g, '<br>');
  }

  function firstSentences(text, maxCount) {
    const sentenceRegex = /[^.!?\n]+(?:[.!?…]+|$)/g;
    const sentences = (String(text || '').match(sentenceRegex) || [])
      .map(function (s) { return s.trim(); })
      .filter(Boolean);
    if (!sentences.length) return '';
    return sentences.slice(0, Math.max(1, maxCount || 2)).join(' ');
  }

  function resolveOfficialFromPayload(termName, data) {
    const official = data && data.official ? data.official : null;
    if (official && official.summary) {
      return {
        summary: String(official.summary).trim(),
        sourceLabel: official.source_label || official.sourceLabel || '',
        sourceUrl: official.source_url || official.sourceUrl || '',
      };
    }
    const preset =
      window.JurinStockTerms &&
      typeof window.JurinStockTerms.getOfficialSummaryPreset === 'function'
        ? window.JurinStockTerms.getOfficialSummaryPreset(termName)
        : null;
    if (preset && preset.summary) {
      return {
        summary: firstSentences(preset.summary, 4),
        sourceLabel: preset.sourceLabel || '',
        sourceUrl: preset.sourceUrl || '',
      };
    }
    return null;
  }

  function renderAnswer(termName, data) {
    const resultContainer = document.getElementById('resultContainer');
    resultContainer.classList.remove('loading');

    const answerText =
      typeof data === 'string'
        ? data
        : (data && data.answer) || '설명 결과가 비어 있습니다.';
    const normalized = normalizeTermAnswerText(answerText);
    const officialInfo = typeof data === 'object' && data
      ? resolveOfficialFromPayload(termName, data)
      : null;
    const usedAiDefinitionFallback = !officialInfo;
    const aiDefinition = data && (data.ai_definition || data.aiDefinition)
      ? String(data.ai_definition || data.aiDefinition).trim()
      : '';
    const definitionSummary = officialInfo && officialInfo.summary
      ? officialInfo.summary
      : aiDefinition || firstSentences(normalized, 2) || normalized || '설명 결과가 비어 있습니다.';
    const bodyHtml = renderImportantSummaryHtml(normalized);
    const sourceLabel = officialInfo && officialInfo.sourceLabel ? officialInfo.sourceLabel : '';
    const sourceUrl = officialInfo && officialInfo.sourceUrl ? officialInfo.sourceUrl : '';
    resultContainer.innerHTML = `
      <div class="term-definition">
        <div class="term-title">${escapeHtml(termName)}</div>
        <div class="term-content">
          <div class="term-section">
            <div class="term-section-title">정의</div>
            <div class="term-section-body term-summary-box term-official-box">${escapeHtml(definitionSummary)}</div>
            ${
              usedAiDefinitionFallback
                ? '<div class="term-source term-source-fallback">공식 출처(위키백과)에서 가져오지 못해 AI 정의로 요약을 표시합니다.</div>'
                : sourceLabel
                  ? `<div class="term-source">${
                      sourceUrl
                        ? `출처: <a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(sourceLabel)}</a>`
                        : `출처: ${escapeHtml(sourceLabel)}`
                    }</div>`
                  : ''
            }
          </div>
          <div class="term-section">
            <div class="term-section-title">설명</div>
            <div class="term-section-body term-summary-box">${bodyHtml}</div>
          </div>
        </div>
      </div>
    `;
    scrollGlossaryResultIntoView();
  }

  // 용어 검색 함수
  async function searchTerm() {
    const inputEl = document.getElementById('termInput');
    const termName = inputEl.value.trim();

    if (!termName) {
      openJurinAlert('용어를 입력해주세요.');
      return;
    }

    renderLoading();

    try {
      const response = await fetch(`${GLOSSARY_API_BASE}/api/terms/explain`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ term: termName })
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok || !data.success) {
        const msg = data.message || '용어 설명 요청에 실패했습니다.';
        renderError(msg);
        return;
      }

      renderAnswer(termName, data);
    } catch (error) {
      renderError('서버(localhost:5000)에 연결할 수 없습니다. 백엔드를 실행했는지 확인하세요.');
    }
  }

  // 인기 용어 검색 함수
  function searchPopularTerm(termName) {
    document.getElementById('termInput').value = termName;
    searchTerm();
  }

  // 엔터 키로 검색 실행
  document.getElementById('termInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      searchTerm();
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    if (window.JurinStockTerms) {
      if (typeof JurinStockTerms.mountGlossaryTabs === 'function') {
        JurinStockTerms.mountGlossaryTabs('glossaryCategoryTabs', 'glossaryCategoryPanel');
      }
    }
    if (window.JurinStockAutocomplete && window.JurinStockTerms && JurinStockTerms.GLOSSARY_CATEGORIES) {
      var termNames = [];
      JurinStockTerms.GLOSSARY_CATEGORIES.forEach(function (cat) {
        (cat.items || []).forEach(function (it) {
          if (it && it.name) termNames.push(it.name);
        });
      });
      var termInp = document.getElementById('termInput');
      if (termInp) JurinStockAutocomplete.attachLocal(termInp, termNames, { maxItems: 14 });
    }
    try {
      var params = new URLSearchParams(window.location.search);
      var preset = params.get('term');
      if (preset) {
        var inp = document.getElementById('termInput');
        if (inp) inp.value = preset;
        searchTerm();
      }
    } catch (e) { /* ignore */ }
  });
</script>

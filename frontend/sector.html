<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>섹터 상세 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  .sector-page {
    min-height: 100vh;
    padding-top: 84px;
    background: radial-gradient(circle at 10% 0%, rgba(79, 158, 255, 0.14), transparent 45%),
                radial-gradient(circle at 90% 20%, rgba(0, 212, 255, 0.12), transparent 45%),
                var(--navy);
  }

  .sector-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 48px;
  }

  .sector-hero {
    border: 1px solid rgba(79, 158, 255, 0.2);
    border-radius: 18px;
    padding: 28px;
    background: linear-gradient(140deg, rgba(13, 45, 107, 0.7), rgba(10, 22, 40, 0.9));
    margin-bottom: 24px;
  }

  .sector-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid rgba(0, 212, 255, 0.35);
    background: rgba(0, 212, 255, 0.08);
  }

  .sector-name {
    margin-top: 12px;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .sector-desc {
    margin-top: 12px;
    color: var(--gray-200);
    line-height: 1.7;
    font-size: 15px;
  }

  .sector-keywords {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sector-keyword {
    font-size: 12px;
    font-weight: 600;
    color: #cbe5ff;
    border: 1px solid rgba(79, 158, 255, 0.3);
    border-radius: 999px;
    padding: 6px 10px;
    background: rgba(79, 158, 255, 0.1);
  }

  .sector-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .sector-actions .btn-ghost,
  .sector-actions .btn-primary {
    min-width: 168px;
  }

  .stocks-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 24px;
    margin-top: 24px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-300);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(79, 158, 255, 0.25);
    background: rgba(79, 158, 255, 0.08);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5df2a0;
    box-shadow: 0 0 10px rgba(93, 242, 160, 0.7);
  }

  .live-dot.error {
    background: #ff6e6e;
    box-shadow: 0 0 10px rgba(255, 110, 110, 0.7);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 14px 10px;
    text-align: left;
    border-bottom: 1px solid rgba(79, 158, 255, 0.1);
  }

  .stocks-table th {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 0.02em;
  }

  .stocks-table td {
    font-size: 14px;
    color: var(--white);
  }

  .stock-name {
    font-weight: 700;
  }

  .stock-code {
    font-size: 12px;
    color: var(--gray-400);
    margin-top: 2px;
  }

  .stock-price {
    color: var(--accent);
    font-weight: 700;
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--up);
  }

  .stock-change.down {
    color: var(--down);
  }

  .stock-change.flat {
    color: var(--gray-400);
  }

  @media (max-width: 900px) {
    .stocks-table th:nth-child(5),
    .stocks-table td:nth-child(5) {
      display: none;
    }
  }

  /* ── 종목 클릭 상호작용 ───────────────────────── */
  .hidden { display: none !important; }

  .stock-row {
    cursor: pointer;
    transition: background 0.15s;
  }
  .stock-row:hover {
    background: rgba(79, 158, 255, 0.07);
  }
  .stock-row.active {
    background: rgba(79, 158, 255, 0.12);
  }

  /* ── 주식 상세 뷰 ────────────────────────────── */
  .sector-detail-view.hidden { display: none; }

  .stock-detail-view {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(79,158,255,0.16);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 24px;
  }

  .stock-detail-header {
    padding: 20px;
    border-bottom: 1px solid rgba(79,158,255,0.15);
    background:
      radial-gradient(circle at 15% 10%, rgba(46,115,255,0.2), transparent 42%),
      radial-gradient(circle at 75% 10%, rgba(0,212,255,0.16), transparent 45%),
      linear-gradient(180deg, rgba(11,24,46,0.85), rgba(8,16,31,0.9));
  }

  .btn-back {
    background: transparent;
    border: 1px solid rgba(79,158,255,0.3);
    color: var(--gray-200);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-back:hover {
    background: rgba(79,158,255,0.12);
    color: var(--white);
  }

  .stock-detail-head {
    padding: 26px 24px 12px;
    border-bottom: 1px solid rgba(79,158,255,0.18);
  }
  .stock-detail-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .stock-detail-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.4px;
    color: var(--white);
  }
  .stock-detail-code {
    margin-top: 4px;
    font-size: 13px;
    color: var(--gray-400);
    font-family: 'DM Mono', monospace;
  }
  .stock-detail-price {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .detail-price-main {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -0.6px;
  }
  .detail-price-sub {
    display: inline-flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    font-weight: 700;
  }
  .detail-price-sub.up   { color: var(--up); }
  .detail-price-sub.down { color: var(--down); }
  .detail-price-sub.flat { color: var(--gray-400); }

  .detail-chip {
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    border: 1px solid transparent;
  }
  .detail-chip.up   { background: rgba(255,71,71,0.16); border-color: rgba(255,71,71,0.4); color: var(--up); }
  .detail-chip.down { background: rgba(79,158,255,0.16); border-color: rgba(79,158,255,0.4); color: var(--down); }
  .detail-chip.flat { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); color: var(--gray-200); }

  @keyframes detail-flash-up {
    0%   { background: rgba(79, 201, 122, 0.25); }
    100% { background: transparent; }
  }
  @keyframes detail-flash-down {
    0%   { background: rgba(255, 92, 92, 0.25); }
    100% { background: transparent; }
  }
  .detail-price-main.flash-up   { animation: detail-flash-up   0.7s ease-out; border-radius: 8px; }
  .detail-price-main.flash-down { animation: detail-flash-down 0.7s ease-out; border-radius: 8px; }

  .stock-detail-body {
    padding: 16px 20px 24px;
  }
  .detail-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .detail-range-btn {
    flex: 1;
    min-width: 0;
    border: 1px solid rgba(79,158,255,0.2);
    background: rgba(255,255,255,0.03);
    color: var(--gray-200);
    border-radius: 10px;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .detail-range-btn.active {
    background: rgba(79,158,255,0.18);
    border-color: rgba(79,158,255,0.45);
    color: #dff3ff;
  }

  .chart-placeholder {
    border: 1px solid rgba(79,158,255,0.18);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.02);
  }
  .chart-skeleton {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    background: linear-gradient(115deg, rgba(79,158,255,0.05), rgba(79,158,255,0.18), rgba(79,158,255,0.05));
    animation: chart-wave 1.7s linear infinite;
  }
  @keyframes chart-wave {
    0%   { background-position: -260px 0; }
    100% { background-position:  260px 0; }
  }
  .chart-note {
    margin-top: 10px;
    font-size: 12px;
    color: var(--gray-400);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-card {
    border-radius: 12px;
    border: 1px solid rgba(79,158,255,0.16);
    padding: 12px;
    background: rgba(255,255,255,0.02);
  }
  .detail-label {
    font-size: 12px;
    color: var(--gray-400);
    margin-bottom: 6px;
  }
  .detail-value {
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
  }

  .detail-cta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-buy, .detail-sell {
    border: none;
    border-radius: 12px;
    padding: 12px 10px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
  }
  .detail-buy  { background: linear-gradient(135deg, #1f9fff, #00c2ff); color: #05162e; }
  .detail-sell { background: linear-gradient(135deg, #ff5f64, #ff8157); color: #fff; }

  .detail-foot {
    border-radius: 12px;
    border: 1px solid rgba(79,158,255,0.14);
    background: rgba(255,255,255,0.02);
    padding: 12px;
    font-size: 13px;
    color: var(--gray-200);
    line-height: 1.55;
  }
</style>
</head>

<main class="sector-page">
  <div class="sector-wrap">

    <!-- ── 섹터 메인 뷰 ── -->
    <div id="sectorMainView">
    <section class="sector-hero">
      <div class="sector-badge" id="sectorBadge">📌 관심 섹터</div>
      <h1 class="sector-name" id="sectorName">섹터 정보를 불러오는 중...</h1>
      <p class="sector-desc" id="sectorDesc">선택한 섹터의 핵심 포인트를 요약해 보여줍니다.</p>
      <div class="sector-keywords" id="sectorKeywords"></div>
      <div class="sector-actions">
        <button type="button" class="btn-ghost" onclick="window.location.href='market.html'">시장 페이지로 돌아가기</button>
      </div>
    </section>

    <section class="stocks-section">
      <div class="stocks-header">
        <div class="stocks-title">주요 종목</div>
        <div class="live-badge">
          <span class="live-dot" id="liveDot"></span>
          <span id="liveStatus">연결 중...</span>
        </div>
      </div>
      <table class="stocks-table">
        <thead>
          <tr>
            <th>종목명</th>
            <th>현재가</th>
            <th>전일대비</th>
            <th>등락률</th>
            <th>거래량</th>
          </tr>
        </thead>
        <tbody id="sectorStocksBody">
          <tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px">시세 불러오는 중...</td></tr>
        </tbody>
      </table>
    </section>
    </div>

    <!-- ── 종목 상세 뷰 ── -->
    <div id="stockDetailView" class="sector-detail-view hidden" aria-hidden="true">
      <div class="stock-detail-header">
        <button class="btn-back" type="button" onclick="closeStockDetail()">← 종목 목록으로 돌아가기</button>
      </div>
      <div class="stock-detail-head">
        <div class="stock-detail-top">
          <div>
            <div class="stock-detail-name" id="detailName">-</div>
            <div class="stock-detail-code" id="detailCode">-</div>
          </div>
        </div>
        <div class="stock-detail-price">
          <div class="detail-price-main" id="detailPrice">₩0</div>
          <div class="detail-price-sub flat" id="detailChange">±0 (0.00%)</div>
        </div>
      </div>
      <div class="stock-detail-body">
        <div class="detail-toolbar">
          <button class="detail-range-btn active" type="button" data-range="1d" onclick="onRangeClick(this)">1일</button>
          <button class="detail-range-btn" type="button" data-range="1w" onclick="onRangeClick(this)">1주</button>
          <button class="detail-range-btn" type="button" data-range="1m" onclick="onRangeClick(this)">1개월</button>
          <button class="detail-range-btn" type="button" data-range="1y" onclick="onRangeClick(this)">1년</button>
        </div>
        <div class="chart-placeholder" id="chartWrapper">
          <div id="stockChart" style="width:100%;height:200px;display:none;"></div>
          <div class="chart-skeleton" id="chartSkeleton"></div>
          <div class="chart-note" id="chartNote" style="display:none;"></div>
        </div>
        <div class="detail-grid">
          <div class="detail-card">
            <div class="detail-label">거래량</div>
            <div class="detail-value" id="detailVolume">-</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">상태</div>
            <div class="detail-value" id="detailState">실시간</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">전일대비</div>
            <div class="detail-value" id="detailDelta">-</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">등락률</div>
            <div class="detail-value" id="detailRate">-</div>
          </div>
        </div>
        <div class="detail-cta">
          <button class="detail-buy" type="button">매수</button>
          <button class="detail-sell" type="button">매도</button>
        </div>
        <div class="detail-foot" id="detailFootNote">
          종목을 누르면 상세 정보가 열립니다.
        </div>
      </div>
    </div>

  </div>
</main>

  function resolveSectorName(rawName) {
    const cleaned = (rawName || '').trim();
    if (!cleaned) return '';
    if (sectorData[cleaned]) return cleaned;
    if (cleaned === '의료·바이오' || cleaned === '의료바이오') return '바이오/제약';
    return sectorAliases[cleaned] || cleaned;
  }

  function formatCurrency(value) {
    return '₩' + Number(value || 0).toLocaleString();
  }

  function formatNumber(value) {
    const n = Number(value || 0);
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
    if (n >= 10000) return (n / 10000).toFixed(1) + '만';
    return n.toLocaleString();
  }

  function renderStocksRows(stocks) {
    const body = document.getElementById('sectorStocksBody');
    if (!Array.isArray(stocks) || stocks.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px">표시할 종목이 없습니다.</td></tr>';
      return;
    }

    body.innerHTML = stocks.map((stock) => {
      if (stock.loading) {
        return `
          <tr>
            <td>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-code">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">시세 불러오는 중...</td>
          </tr>
        `;
      }

      if (stock.error && (stock.price === undefined || stock.price === null)) {
        return `
          <tr>
            <td>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-code">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">조회 지연 (${stock.error})</td>
          </tr>
        `;
      }

      const dir = stock.direction || 'flat';
      const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '-');
      const sign = dir === 'up' ? '+' : (dir === 'down' ? '' : '±');
      const rate = Number(stock.rate || 0);
      const change = Math.abs(Number(stock.change || 0));

      return `
        <tr class="stock-row ${selectedStockCode === stock.code ? 'active' : ''}" onclick="openStockDetail('${stock.code}')">
          <td>
            <div class="stock-name">${stock.name}</div>
            <div class="stock-code">${stock.code}</div>
          </td>
          <td class="stock-price">${formatCurrency(stock.price)}</td>
          <td class="stock-change ${dir}">${arrow} ${formatCurrency(change)}</td>
          <td class="stock-change ${dir}">${sign}${Math.abs(rate).toFixed(2)}%</td>
          <td>${formatNumber(stock.volume)}${stock.stale ? ' (지연)' : ''}</td>
        </tr>
      `;
    }).join('');
  }

  async function fetchSectorPrices() {
    if (!selectedSector || !selectedSector.stocks || selectedSector.stocks.length === 0) return;

    const codes = selectedSector.stocks.map(s => s.code).join(',');
    const names = selectedSector.stocks.map(s => `${s.code}:${s.name}`).join('|');
    const dot = document.getElementById('liveDot');
    const status = document.getElementById('liveStatus');

    try {
      status.textContent = '시세 불러오는 중...';
      const url = `${BACKEND}/api/live-prices?codes=${encodeURIComponent(codes)}&names=${encodeURIComponent(names)}&page=1&page_size=${selectedSector.stocks.length}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (!data.success) throw new Error(data.message || '조회 실패');

      // API 응답 순서와 무관하게 섹터 정의 순서로 맞춤 (누락·로딩 행 안정화)
      const byCode = Object.fromEntries((data.stocks || []).filter(Boolean).map(s => [s.code, s]));
      const ordered = selectedSector.stocks.map(s => {
        const row = byCode[s.code];
        if (!row) return { code: s.code, name: s.name, loading: true };
        return { ...row, name: row.name || s.name };
      });

      ordered.forEach(s => {
        if (s && s.code && !s.loading && !s.error) stockDetailCache[s.code] = s;
      });

      dot.classList.remove('error');
      status.textContent = `${data.ts} 업데이트 (${ordered.length}종목)`;
      renderStocksRows(ordered);

      // 상세 뷰가 열려 있으면 시세 갱신
      if (selectedStockCode && stockDetailCache[selectedStockCode]) {
        renderStockDetail(stockDetailCache[selectedStockCode]);
      }
    } catch (err) {
      dot.classList.add('error');
      status.textContent = '연결 실패';
      console.warn('[sector live-prices]', err.message);
    }
  }

  async function fetchDetailLiveSync() {
    if (!selectedStockCode || !selectedSector) return;
    const sectorStock = selectedSector.stocks.find(s => s.code === selectedStockCode);
    const name = (stockDetailCache[selectedStockCode] && stockDetailCache[selectedStockCode].name)
      || (sectorStock && sectorStock.name)
      || selectedStockCode;
    try {
      const namesParam = encodeURIComponent(`${selectedStockCode}:${name}`);
      const res = await fetch(
        `${BACKEND}/api/live-prices?codes=${encodeURIComponent(selectedStockCode)}&names=${namesParam}&page=1&page_size=1&filter=all&sync_refresh=1`
      );
      const data = await res.json();
      if (!data.success || !Array.isArray(data.stocks)) return;
      data.stocks.forEach(s => {
        if (s && s.code && !s.loading && !s.error) stockDetailCache[s.code] = s;
      });
      const row = stockDetailCache[selectedStockCode];
      if (row) renderStockDetail(row);
    } catch (e) {
      console.warn('[sector detail live-sync]', e.message);
    }
  }

  // ── 종목 상세 뷰 ────────────────────────────────────
  function openStockDetail(code) {
    // 캐시에 시세가 없으면 loading 상태로 종목명 표시
    const sectorStock = selectedSector && selectedSector.stocks
      ? selectedSector.stocks.find(s => s.code === code)
      : null;
    const stock = stockDetailCache[code] || (sectorStock ? { ...sectorStock, loading: true } : null);
    if (!stock) return;

    selectedStockCode = code;
    detailLastRenderedPrice = null;
    if (detailPollHandle) {
      clearInterval(detailPollHandle);
      detailPollHandle = null;
    }

    // 뷰 전환
    document.getElementById('sectorMainView').classList.add('hidden');
    const detailView = document.getElementById('stockDetailView');
    detailView.classList.remove('hidden');
    detailView.setAttribute('aria-hidden', 'false');
    window.scrollTo({ top: 0, behavior: 'smooth' });

    renderStockDetail(stock);

    // 범위 버튼 초기화
    currentChartRange = '1d';
    document.querySelectorAll('.detail-range-btn').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
    });
    loadChart(code, currentChartRange);

    // 테이블 active 행 갱신
    renderStocksRows(
      selectedSector && selectedSector.stocks
        ? selectedSector.stocks.map(s => stockDetailCache[s.code] || { ...s, loading: true })
        : []
    );

    detailPollHandle = setInterval(fetchDetailLiveSync, DETAIL_POLL_INTERVAL);
    fetchDetailLiveSync();
  }

  function closeStockDetail() {
    const detailView = document.getElementById('stockDetailView');
    if (detailView.classList.contains('hidden')) return;

    if (detailPollHandle) {
      clearInterval(detailPollHandle);
      detailPollHandle = null;
    }
    detailLastRenderedPrice = null;
    selectedStockCode = null;
    document.getElementById('sectorMainView').classList.remove('hidden');
    detailView.classList.add('hidden');
    detailView.setAttribute('aria-hidden', 'true');

    if (stockChartInstance) {
      stockChartInstance.remove();
      stockChartInstance = null;
    }
  }

  function renderStockDetail(stock) {
    const dir = stock.direction || 'flat';
    const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '±');
    const changeAbs = Math.abs(Number(stock.change || 0));
    const rate = Number(stock.rate || 0);
    const signedRate = dir === 'down' ? -Math.abs(rate) : Math.abs(rate);
    const changeClass = dir === 'up' ? 'up' : (dir === 'down' ? 'down' : 'flat');
    const sign = dir === 'up' ? '+' : (dir === 'down' ? '-' : '');

    document.getElementById('detailName').textContent = stock.name || stock.code;
    document.getElementById('detailCode').textContent = stock.code;

    const priceEl = document.getElementById('detailPrice');
    const newPrice = stock.price;
    if (detailLastRenderedPrice != null && newPrice != null && Number(detailLastRenderedPrice) !== Number(newPrice)) {
      priceEl.classList.remove('flash-up', 'flash-down');
      void priceEl.offsetWidth;
      priceEl.classList.add(Number(newPrice) > Number(detailLastRenderedPrice) ? 'flash-up' : 'flash-down');
    }
    detailLastRenderedPrice = newPrice;
    priceEl.textContent = formatCurrency(stock.price || 0);

    const changeEl = document.getElementById('detailChange');
    changeEl.className = `detail-price-sub ${changeClass}`;
    changeEl.innerHTML = `${arrow} ${formatCurrency(changeAbs)} <span class="detail-chip ${changeClass}">${sign}${Math.abs(signedRate).toFixed(2)}%</span>`;

    document.getElementById('detailVolume').textContent = formatNumber(stock.volume || 0);
    document.getElementById('detailState').textContent = stock.loading ? '불러오는 중' : (stock.stale ? '지연 시세' : '실시간');
    document.getElementById('detailDelta').textContent = `${arrow} ${formatCurrency(changeAbs)}`;
    document.getElementById('detailRate').textContent = `${sign}${Math.abs(signedRate).toFixed(2)}%`;

    document.getElementById('detailFootNote').textContent = stock.stale
      ? '일시적으로 지연된 시세입니다. 다음 갱신에서 자동 반영됩니다.'
      : `${stock.name || stock.code} 실시간 요약 화면입니다.`;
  }

  function onRangeClick(btn) {

  }

  async function loadChart(code, range) {
    const chartDiv = document.getElementById('stockChart');
    const skeleton  = document.getElementById('chartSkeleton');
    const note      = document.getElementById('chartNote');

    chartDiv.style.display = 'none';
    note.style.display     = 'none';
    skeleton.style.display = '';

    try {
      const res  = await fetch(`${BACKEND}/api/chart-data/${code}?range=${range}`);
      const data = await res.json();

      skeleton.style.display = 'none';

      if (!data.success || !data.candles || data.candles.length === 0) {
        note.textContent   = '차트 데이터를 불러올 수 없습니다.';
        note.style.display = '';
        return;
      }

      chartDiv.style.display = '';
      renderChart(data.candles, data.ma5 || [], data.ma20 || [], data.intraday);
    } catch (e) {
      skeleton.style.display = 'none';
      note.textContent   = '차트 로드 중 오류가 발생했습니다.';
      note.style.display = '';
    }
  }

  function renderChart(candles, ma5, ma20, intraday) {
    const container = document.getElementById('stockChart');

    if (stockChartInstance) {
      stockChartInstance.remove();
      stockChartInstance = null;
    }

    stockChartInstance = LightweightCharts.createChart(container, {
      width:  container.clientWidth,
      height: 200,
      layout: {
        background: { color: 'transparent' },
        textColor:  '#8899aa',
      },
      grid: {
        vertLines: { color: 'rgba(255,255,255,0.05)' },
        horzLines: { color: 'rgba(255,255,255,0.05)' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: {
        borderColor:  'rgba(255,255,255,0.1)',
        scaleMargins: { top: 0.1, bottom: 0.1 },
      },
      timeScale: {
        borderColor:    'rgba(255,255,255,0.1)',
        timeVisible:    !!intraday,
        secondsVisible: false,
      },
      handleScroll: true,
      handleScale:  true,
    });

    const candleSeries = stockChartInstance.addCandlestickSeries({
      upColor:         '#ef5350',
      downColor:       '#42a5f5',
      borderUpColor:   '#ef5350',
      borderDownColor: '#42a5f5',
      wickUpColor:     '#ef5350',
      wickDownColor:   '#42a5f5',
    });
    candleSeries.setData(candles);

    if (ma5.length > 0) {
      const s = stockChartInstance.addLineSeries({
        color: '#2ecc71', lineWidth: 1,
        priceLineVisible: false, lastValueVisible: false,
      });
      s.setData(ma5);
    }

    if (ma20.length > 0) {
      const s = stockChartInstance.addLineSeries({
        color: '#ab47bc', lineWidth: 1,
        priceLineVisible: false, lastValueVisible: false,
      });
      s.setData(ma20);
    }

    stockChartInstance.timeScale().fitContent();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeStockDetail();
  });

  // ── 섹터 페이지 초기화 ────────────────────────────────
  function renderSectorPage() {
    const params = new URLSearchParams(window.location.search);
    const sectorName = resolveSectorName(params.get('name'));
    const data = sectorData[sectorName] || null;

    if (!sectorName || !data) {
      document.getElementById('sectorName').textContent = '선택한 섹터를 찾을 수 없습니다.';
      document.getElementById('sectorDesc').textContent = '시장 페이지로 돌아가서 관심 섹터 버튼을 다시 눌러주세요.';
      document.getElementById('sectorBadge').textContent = '⚠️ 잘못된 접근';
      document.getElementById('liveStatus').textContent = '대상 섹터 없음';
      renderStocksRows([]);
      return;
    }

    selectedSector = data;

    document.title = `${sectorName} 섹터 - 주린닷컴`;
    document.getElementById('sectorBadge').textContent = `${data.emoji} ${sectorName} 섹터`;
    document.getElementById('sectorName').textContent = `${sectorName} 섹터 브리핑`;
    document.getElementById('sectorDesc').textContent = data.desc;

    const keywordWrap = document.getElementById('sectorKeywords');
    keywordWrap.innerHTML = data.keywords.map(k => `<span class="sector-keyword">#${k}</span>`).join('');

    renderStocksRows(data.stocks.map(s => ({ ...s, loading: true })));
    fetchSectorPrices();
    if (pollHandle) clearInterval(pollHandle);
    pollHandle = setInterval(fetchSectorPrices, POLL_INTERVAL);
  }

  document.addEventListener('DOMContentLoaded', renderSectorPage);
</script>
</body>
</html>

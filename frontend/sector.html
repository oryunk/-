<style>
  .sector-page {
    min-height: 100vh;
    background: radial-gradient(circle at 10% 0%, rgba(47, 143, 95, 0.1), transparent 45%),

                #ffffff;
  }

  .sector-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 24px 48px;
  }

  .sector-hero {
    border: 1px solid rgba(47, 143, 95, 0.18);
    border-radius: 18px;
    padding: 28px;
    background: linear-gradient(180deg, #eef8f1 0%, #ffffff 100%);
    margin-bottom: 24px;
  }

  .sector-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    border: 1px solid rgba(47, 143, 95, 0.32);
    background: rgba(47, 143, 95, 0.1);
  }

  .sector-name {
    margin-top: 12px;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .sector-badge .stock-logo-wrap {
    width: 40px;
    height: 40px;
  }

  .sector-name .stock-cell-toss {
    gap: 12px;
  }

  .sector-desc {
    margin-top: 12px;
    color: var(--gray-400);
    line-height: 1.7;
    font-size: 15px;
  }

  .sector-keywords {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sector-keyword {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    border: 1px solid rgba(47, 143, 95, 0.28);
    border-radius: 999px;
    padding: 6px 10px;
    background: rgba(47, 143, 95, 0.08);
  }

  .sector-actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .sector-actions .btn-ghost,
  .sector-actions .btn-primary {
    min-width: 168px;
  }

  .stocks-section {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.16);
    border-radius: 16px;
    padding: 24px;
    margin-top: 24px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--gray-400);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgba(47, 143, 95, 0.2);
    background: rgba(47, 143, 95, 0.06);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #5df2a0;
    box-shadow: 0 0 10px rgba(93, 242, 160, 0.7);
  }

  .live-dot.error {
    background: #ff6e6e;
    box-shadow: 0 0 10px rgba(255, 110, 110, 0.7);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 14px 10px;
    text-align: left;
    border-bottom: 1px solid rgba(47, 143, 95, 0.1);
  }

  .stocks-table th {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 0.02em;
  }

  .stocks-table td {
    font-size: 14px;
    color: var(--text-primary);
  }

  .stocks-table th.watch-col-th,
  .stocks-table td.watch-cell {
    width: 44px;
    text-align: center;
    vertical-align: middle;
    padding: 4px 2px;
  }

  .watch-heart-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    margin: 0;
    padding: 0;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--gray-300, #c5c5c5);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
  }

  .watch-heart-btn:hover {
    background: rgba(233, 30, 99, 0.08);
    color: #e91e63;
  }

  .watch-heart-btn.is-on {
    color: #e91e63;
    font-weight: 700;
  }

  .stock-name {
    font-weight: 600;
    color: var(--text-primary);
  }

  .stock-cell-toss {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .stock-cell-toss .stock-name {
    min-width: 0;
  }

  .stock-logo-wrap {
    flex: 0 0 auto;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    overflow: hidden;
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stock-logo-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: 50% 50%;
    display: block;
    padding: 2px;
    background: #ffffff;
    box-sizing: border-box;
  }

  .stock-logo-img.stock-logo-img--squareish {
    padding: 6px;
  }

  .stock-logo-img[data-logo-file="005930"],
  .stock-logo-img[data-logo-file="071050"] {
    object-fit: cover;
    object-position: 50% 50%;
    padding: 0;
    border-radius: 22%;
    transform: scale(1.08);
    transform-origin: center center;
  }

  .stock-logo-wrap--detail {
    width: 60px;
    height: 60px;
  }

  .stock-logo-wrap--placeholder {
    font-size: 15px;
    font-weight: 800;
    color: #2f6a4e;
    line-height: 1;
  }

  .jurin-watch-toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(12px);
    z-index: 10050;
    max-width: min(420px, calc(100vw - 32px));
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: rgba(33, 33, 33, 0.92);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .jurin-watch-toast:not([hidden]) {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .jurin-watch-toast.is-warn { background: rgba(180, 83, 9, 0.95); }
  .jurin-watch-toast.is-error { background: rgba(183, 28, 28, 0.95); }
  .jurin-watch-toast.is-ok { background: rgba(27, 94, 32, 0.95); }

  .stock-price {
    font-weight: 700;
    color: var(--accent);
  }

  .stock-price.up { color: var(--market-up); }
  .stock-price.down { color: var(--market-down); }
  .stock-price.flat {
    color: var(--quote-flat);
    font-weight: 700;
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--market-up);
  }

  .stock-change.down {
    color: var(--market-down);
  }

  .stock-change.flat {
    color: var(--quote-flat);
    font-weight: 700;
    letter-spacing: -0.02em;

    .stocks-table th:nth-child(6),
    .stocks-table td:nth-child(6) {
      display: none;
    }
  }

  /* ── 종목 클릭 상호작용 ───────────────────────── */
  .hidden { display: none !important; }

  .stock-row {
    cursor: pointer;
    transition: background 0.15s;
  }
  .stock-row:hover {
    background: rgba(47, 143, 95, 0.08);

  function formatCurrency(value) {
    return '₩' + Number(value || 0).toLocaleString();
  }

  function formatNumber(value) {
    const n = Number(value || 0);
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
    if (n >= 10000) return (n / 10000).toFixed(1) + '만';
    return n.toLocaleString();
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function quoteDirection(stock) {
    if (!stock || stock.loading) return 'flat';
    const d = String(stock.direction || '').toLowerCase();
    if (d === 'up' || d === 'down' || d === 'flat') return d;
    const ch = Number(stock.change);
    if (Number.isFinite(ch)) {
      if (ch > 0) return 'up';
      if (ch < 0) return 'down';
    }
    const r = Number(stock.rate);
    if (Number.isFinite(r)) {
      if (r > 0) return 'up';
      if (r < 0) return 'down';
    }
    return 'flat';
  }

  }

  function bindStockLogoIntrinsicFit(img) {
    if (!img || !img.classList.contains('stock-logo-img')) return;
    const run = () => {
      img.classList.remove('stock-logo-img--squareish');
      const fileCode = img.getAttribute('data-logo-file') || '';
      if (STOCK_LOGO_NO_SQUAREISH_CODES.has(fileCode)) return;
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      if (!w || !h) return;
      const r = w / h;
      if (r >= 0.88 && r <= 1.14) img.classList.add('stock-logo-img--squareish');
    };
    if (img.complete && img.naturalWidth) run();
    else img.addEventListener('load', run, { once: true });
  }

  function applyStockLogoIntrinsicFit(container) {
    if (!container || !container.querySelectorAll) return;
    container.querySelectorAll('img.stock-logo-img').forEach(bindStockLogoIntrinsicFit);
  }

  async function toggleWatchlist(code, name) {
    const logged = await isAuthenticatedForWatchlist();
    if (!logged) {
      showWatchToast('로그인 후 관심 종목을 이용할 수 있습니다.', 'warn');
      if (typeof openLoginModal === 'function') openLoginModal();
      return;
    }
    const c = String(code || '').trim();
    if (!/^\d{6}$/.test(c)) return;
    try {
      const res = await fetch(`${BACKEND}/api/watchlist/toggle`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ code: c }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401) {
        showWatchToast(data.message || '로그인이 필요합니다.', 'warn');
        if (typeof openLoginModal === 'function') openLoginModal();
        return;
      }
      if (!res.ok || !data.success) {
        showWatchToast(data.message || '처리하지 못했습니다.', 'error');
        return;
      }
      const displayName = (name || '').trim()
        || (sectorStocksRowsCache.find(s => s && s.code === c) || {}).name
        || TRADEABLE_STOCKS[c]
        || c;
      if (data.in_watchlist) {
        jurinWatchlistItems = jurinWatchlistItems.filter(i => String(i.code) !== c);
        jurinWatchlistItems.unshift({ code: c, name: displayName, created_at: new Date().toISOString() });
      } else {
        jurinWatchlistItems = jurinWatchlistItems.filter(i => String(i.code) !== c);
      }
      renderStocksRows(sectorStocksRowsCache);
      showWatchToast(data.message || (data.in_watchlist ? '관심종목에 추가했습니다.' : '관심종목에서 제거했습니다.'), 'ok');
    } catch (e) {
      showWatchToast('네트워크 오류입니다.', 'error');
    }
  }

  function renderStocksRows(stocks) {
    sectorStocksRowsCache = Array.isArray(stocks) ? stocks.slice() : [];
    const body = document.getElementById('sectorStocksBody');
    if (!Array.isArray(stocks) || stocks.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:24px">표시할 종목이 없습니다.</td></tr>';
      return;
    }

    body.innerHTML = stocks.map((stock) => {
      if (stock.loading) {
        return `
          <tr>
            <td class="watch-cell">${watchHeartCellHtml(stock.code)}</td>
            <td>${stockNameCellHtml(stock)}</td>
            <td colspan="4" style="color:var(--gray-400)">시세 불러오는 중...</td>
          </tr>
        `;
      }

      if (stock.error && (stock.price === undefined || stock.price === null)) {
        return `
          <tr>
            <td class="watch-cell">${watchHeartCellHtml(stock.code)}</td>
            <td>${stockNameCellHtml(stock)}</td>
            <td colspan="4" style="color:var(--gray-400)">조회 지연 (${escapeHtml(stock.error)})</td>
          </tr>
        `;
      }

      const dir = quoteDirection(stock);
      const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '-');
      const sign = dir === 'up' ? '+' : (dir === 'down' ? '' : '±');
      const rate = Number(stock.rate || 0);
      const change = Math.abs(Number(stock.change || 0));
      const changeClass = dir === 'up' ? 'up' : (dir === 'down' ? 'down' : 'flat');

      return `
        <tr class="stock-row" onclick="openStockDetail('${stock.code}')">
          <td class="watch-cell">${watchHeartCellHtml(stock.code)}</td>
          <td>${stockNameCellHtml(stock)}</td>
          <td class="stock-price ${changeClass}">${formatCurrency(stock.price)}</td>
          <td class="stock-change ${changeClass}">${arrow} ${formatCurrency(change)}</td>
          <td class="stock-change ${changeClass}">${sign}${Math.abs(rate).toFixed(2)}%</td>
          <td class="stock-volume">${formatNumber(stock.volume)}</td>
        </tr>
      `;
    }).join('');
    applyStockLogoIntrinsicFit(body);
  }

  function formatMarketLiveStatus(ts) {

  }

  async function fetchSectorPrices() {
    if (!selectedSector || !selectedSector.stocks || selectedSector.stocks.length === 0) return;

    const codes = selectedSector.stocks.map(s => s.code).join(',');
    const names = selectedSector.stocks.map(s => `${s.code}:${s.name}`).join('|');
    const dot = document.getElementById('liveDot');
    const status = document.getElementById('liveStatus');

    try {
      status.textContent = '시세 불러오는 중...';
      const url = `${BACKEND}/api/live-prices?codes=${encodeURIComponent(codes)}&names=${encodeURIComponent(names)}&page=1&page_size=${selectedSector.stocks.length}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (!data.success) throw new Error(data.message || '조회 실패');

      // API 응답 순서와 무관하게 섹터 정의 순서로 맞춤 (누락·로딩 행 안정화)
      const byCode = Object.fromEntries((data.stocks || []).filter(Boolean).map(s => [s.code, s]));
      const ordered = selectedSector.stocks.map(s => {
        const row = byCode[s.code];
        if (!row) return { code: s.code, name: s.name, loading: true };
        return { ...row, name: row.name || s.name };
      });

      dot.classList.remove('error');
      status.textContent = formatMarketLiveStatus(data.ts);
      renderStocksRows(ordered);
    } catch (err) {
      dot.classList.add('error');
      status.textContent = '연결 실패';
      console.warn('[sector live-prices]', err.message);
    }
  }

      document.getElementById('sectorNameText').textContent = '선택한 섹터를 찾을 수 없습니다.';
      document.getElementById('sectorDesc').textContent = '시장 페이지로 돌아가서 관심 섹터 버튼을 다시 눌러주세요.';
      document.getElementById('sectorBadge').textContent = '잘못된 접근';
      const heroCell = document.getElementById('sectorHeroCell');
      if (heroCell) heroCell.hidden = true;
      document.getElementById('liveStatus').textContent = '대상 섹터 없음';
      renderStocksRows([]);
      return;
    }

    selectedSector = data;

    document.title = `${sectorName} 섹터 - 주린닷컴`;
    applySectorPageIcons(sectorName);
    document.getElementById('sectorNameText').textContent = `${sectorName} 섹터 브리핑`;
    document.getElementById('sectorDesc').textContent = data.desc;

    const keywordWrap = document.getElementById('sectorKeywords');
    keywordWrap.innerHTML = data.keywords.map(k => `<span class="sector-keyword">#${k}</span>`).join('');

    renderStocksRows(data.stocks.map(s => ({ ...s, loading: true })));
    fetchSectorPrices();
    if (pollHandle) clearInterval(pollHandle);
    pollHandle = setInterval(fetchSectorPrices, POLL_INTERVAL);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await jurinRefreshWatchlist();
    renderSectorPage();
  });
</script>

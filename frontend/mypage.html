<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/brand/favicon.ico?v=20260607" sizes="any">
<title>마이페이지 - 주린닷컴</title>
<script>
(function () {
  if (new URLSearchParams(location.search).get('embed') === '1') {
    document.documentElement.classList.add('auth-embed');
  }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260428">
<style>
  .auth-page {
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 20px 48px;
    background:
      radial-gradient(circle at top right, rgba(47, 143, 95, 0.12), transparent 32%),
      radial-gradient(circle at bottom left, rgba(47, 143, 95, 0.08), transparent 38%),
      #ffffff;
  }
  .auth-card {
    position: relative;
    width: min(100%, 520px);
    padding: 32px 28px 36px;
    border-radius: 24px;
    border: 1px solid rgba(47, 143, 95, 0.18);
    background: #ffffff;
    box-shadow: 0 20px 60px rgba(31, 47, 38, 0.1);
    margin: 0 auto;
  }
  html.auth-embed .auth-page {
    min-height: 0;
    padding: 4px 12px 12px;
    background: transparent;
  }
  html.auth-embed .auth-card {
    box-shadow: none;
    border: none;
    padding: 24px 16px 20px;
    border-radius: 0;
  }
  .lumi-chat-root, .lumi-chat-fab { display: none !important; }
  .auth-kicker {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .auth-card h1 { font-size: 28px; margin-bottom: 12px; font-weight: 800; }
  .auth-lead {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-field-group { display: flex; flex-direction: column; }
  .auth-field-line { display: flex; align-items: center; gap: 12px; }
  .auth-field-label {
    flex: 0 0 92px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
  }
  .auth-field-control { flex: 1; min-width: 0; }
  .auth-input-row { display: flex; gap: 8px; align-items: stretch; }
  .auth-input-row .auth-input { flex: 1; min-width: 0; }
  .auth-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(47, 143, 95, 0.2);
    background: var(--gray-100);
    font-size: 14px;
    box-sizing: border-box;
    font-family: inherit;
  }
  .auth-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47, 143, 95, 0.12);
  }
  .auth-input.is-invalid {
    border-color: #e53935;
    box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.15);
  }
  .auth-input[readonly] { opacity: 0.85; cursor: default; }
  .auth-field-error {
    display: none;
    margin: 6px 0 0 104px;
    font-size: 12px;
    font-weight: 600;
    color: #e53935;
  }
  .auth-field-group[data-field="form"] .auth-field-error { margin-left: 0; }
  .auth-field-error.is-visible { display: block; }
  .auth-field-error.is-success { color: var(--green); }
  .auth-send-btn, .auth-secondary-btn {
    flex-shrink: 0;
    padding: 0 16px;
    border: none;
    border-radius: 12px;
    background: rgba(47, 143, 95, 0.12);
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .auth-send-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .auth-submit {
    margin-top: 6px;
    border: none;
    border-radius: 12px;
    padding: 15px 18px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
  }
  .auth-submit:disabled { opacity: 0.7; cursor: wait; }
  .mypage-panel[hidden] { display: none !important; }
  .mypage-login-prompt {
    text-align: center;
    padding: 24px 0;
    color: var(--gray-400);
    font-size: 14px;
  }
  .mypage-login-prompt button {
    margin-top: 12px;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .mypage-avatar-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(47, 143, 95, 0.12);
  }
  .mypage-avatar-preview {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center center;
    background: #e8ece9;
    flex-shrink: 0;
  }
  .mypage-avatar-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
    flex: 1;
  }
  .mypage-avatar-actions button {
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .mypage-avatar-upload-btn {
    background: rgba(47, 143, 95, 0.12);
    color: var(--accent);
  }
  .mypage-avatar-reset-btn {
    background: #f3f4f3;
    color: var(--gray-400);
  }
  .mypage-avatar-file {
    display: none;
  }
  .mypage-edit-panel.is-google #mypageLoginIdSection,
  .mypage-edit-panel.is-google #mypagePasswordSection {
    display: none !important;
  }
  .mypage-withdraw-btn {
    flex-shrink: 0;
    align-self: center;
    margin-left: auto;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    background: #e57373;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    line-height: 1.2;
    white-space: nowrap;
  }
  .mypage-withdraw-btn:hover {
    background: #ef5350;
  }
  .mypage-withdraw-modal {
    position: fixed;
    inset: 0;
    z-index: 1200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(20, 24, 22, 0.45);
  }
  .mypage-withdraw-modal.is-open { display: flex; }
  .mypage-withdraw-panel {
    width: min(100%, 400px);
    padding: 24px 22px;
    border-radius: 18px;
    background: #fff;
    box-shadow: 0 20px 50px rgba(31, 47, 38, 0.18);
  }
  .mypage-withdraw-panel h2 {
    font-size: 20px;
    margin-bottom: 10px;
    color: #c62828;
  }
  .mypage-withdraw-panel p {
    font-size: 13px;
    color: var(--gray-400);
    line-height: 1.5;
    margin-bottom: 14px;
  }
  .mypage-withdraw-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .mypage-withdraw-actions button {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .mypage-withdraw-cancel {
    background: #f3f4f3;
    color: var(--gray-400);
  }
  .mypage-withdraw-confirm {
    background: #c62828;
    color: #fff;
  }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div id="mypageLoading" class="auth-lead">불러오는 중…</div>
    <div id="mypageLoginPrompt" class="mypage-login-prompt" hidden>
      <p>로그인이 필요합니다.</p>
      <button type="button" id="mypageOpenLoginBtn">로그인하기</button>
    </div>

    <div id="mypageVerifyPanel" class="mypage-panel" hidden>
      <div class="auth-kicker">JURIN.COM MY PAGE</div>
      <h1>마이페이지</h1>
      <p class="auth-lead">프로필을 수정하려면 가입 이메일 인증이 필요합니다.</p>
      <form class="auth-form" onsubmit="submitProfileVerify(event)" novalidate>
        <div class="auth-field-group" data-field="email">
          <div class="auth-field-line">
            <label class="auth-field-label" for="mypageEmail">이메일</label>
            <div class="auth-field-control">
              <input type="email" class="auth-input" id="mypageEmail" readonly autocomplete="email">
            </div>
          </div>
          <div class="auth-field-error" id="mypageErrorEmail" role="alert"></div>
        </div>
        <div class="auth-field-group" data-field="emailCode">
          <div class="auth-field-line">
            <label class="auth-field-label" for="mypageEmailCode">인증코드</label>
            <div class="auth-field-control">
              <div class="auth-input-row">
                <input type="text" class="auth-input" id="mypageEmailCode" placeholder="6자리 숫자" inputmode="numeric" maxlength="6">
                <button type="button" class="auth-send-btn" id="mypageSendEmailCode">발송하기</button>
              </div>
            </div>
          </div>
          <div class="auth-field-error" id="mypageErrorEmailCode" role="alert"></div>
        </div>
        <div class="auth-field-group" data-field="form">
          <div class="auth-field-error" id="mypageErrorVerifyForm" role="alert"></div>
        </div>
        <button class="auth-submit" type="submit" id="mypageVerifySubmitBtn">인증 확인</button>
      </form>
    </div>

    <div id="mypageEditPanel" class="mypage-panel mypage-edit-panel" hidden>
      <div class="auth-kicker">JURIN.COM MY PAGE</div>
      <h1>프로필 수정</h1>
      <p class="auth-lead" id="mypageEditLead">아이디·닉네임·비밀번호를 변경할 수 있습니다.</p>
      <form class="auth-form" onsubmit="submitProfileSave(event)" novalidate>
        <div class="mypage-avatar-section">
          <img class="mypage-avatar-preview jurin-user-avatar" id="mypageAvatarPreview" src="assets/profile/default-avatar.svg" alt="프로필 사진" width="72" height="72">
          <div class="mypage-avatar-actions">
            <input type="file" class="mypage-avatar-file" id="mypageAvatarFile" accept="image/jpeg,image/png,image/gif,image/webp">
            <button type="button" class="mypage-avatar-upload-btn" id="mypageAvatarUploadBtn">사진 선택</button>
            <button type="button" class="mypage-avatar-reset-btn" id="mypageAvatarResetBtn">기본으로 변경</button>
          </div>
          <button type="button" class="mypage-withdraw-btn" id="mypageWithdrawOpenBtn">탈퇴</button>
        </div>
        <div class="auth-field-error" id="mypageErrorAvatar" role="alert"></div>
        <div class="auth-field-group" data-field="loginId" id="mypageLoginIdSection">
          <div class="auth-field-line">
            <label class="auth-field-label" for="mypageLoginId">아이디</label>
            <div class="auth-field-control">
              <input type="text" class="auth-input" id="mypageLoginId" maxlength="12" autocomplete="username">
            </div>
          </div>
          <div class="auth-field-error" id="mypageErrorLoginId" role="alert"></div>
        </div>
        <div id="mypagePasswordSection">
          <div class="auth-field-group" data-field="password">
            <div class="auth-field-line">
              <label class="auth-field-label" for="mypagePassword">비밀번호</label>
              <div class="auth-field-control">
                <input type="password" class="auth-input" id="mypagePassword" placeholder="변경 시에만 입력" autocomplete="new-password">
              </div>
            </div>
            <div class="auth-field-error" id="mypageErrorPassword" role="alert"></div>
          </div>
          <div class="auth-field-group" data-field="passwordConfirm">
            <div class="auth-field-line">
              <label class="auth-field-label" for="mypagePasswordConfirm">비밀번호확인</label>
              <div class="auth-field-control">
                <input type="password" class="auth-input" id="mypagePasswordConfirm" placeholder="변경 시에만 입력" autocomplete="new-password">
              </div>
            </div>
            <div class="auth-field-error" id="mypageErrorPasswordConfirm" role="alert"></div>
          </div>
        </div>
        <div class="auth-field-group" data-field="nickname">
          <div class="auth-field-line">
            <label class="auth-field-label" for="mypageNickname">닉네임</label>
            <div class="auth-field-control">
              <input type="text" class="auth-input" id="mypageNickname" maxlength="8" autocomplete="nickname" required>
            </div>
          </div>
          <div class="auth-field-error" id="mypageErrorNickname" role="alert"></div>
        </div>
        <div class="auth-field-group" data-field="form">
          <div class="auth-field-error" id="mypageErrorEditForm" role="alert"></div>
        </div>
        <button class="auth-submit" type="submit" id="mypageSaveBtn">저장</button>
      </form>
    </div>
  </div>
</div>

<div class="mypage-withdraw-modal" id="mypageWithdrawModal" aria-hidden="true">
  <div class="mypage-withdraw-panel" role="dialog" aria-modal="true" aria-labelledby="mypageWithdrawTitle">
    <h2 id="mypageWithdrawTitle">정말 탈퇴하시겠습니까?</h2>
    <p>탈퇴하면 계정 정보와 활동 데이터가 모두 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</p>
    <div class="auth-field-group" data-field="withdrawPassword" id="mypageWithdrawPasswordSection" hidden>
      <div class="auth-field-line">
        <label class="auth-field-label" for="mypageWithdrawPassword">비밀번호</label>
        <div class="auth-field-control">
          <input type="password" class="auth-input" id="mypageWithdrawPassword" placeholder="본인 확인용 비밀번호" autocomplete="current-password">
        </div>
      </div>
      <div class="auth-field-error" id="mypageErrorWithdrawPassword" role="alert"></div>
    </div>
    <div class="auth-field-error" id="mypageErrorWithdrawForm" role="alert"></div>
    <div class="mypage-withdraw-actions">
      <button type="button" class="mypage-withdraw-cancel" id="mypageWithdrawCancelBtn">취소</button>
      <button type="button" class="mypage-withdraw-confirm" id="mypageWithdrawConfirmBtn">탈퇴하기</button>
    </div>
  </div>
</div>

<script src="js/api-base.js"></script>
<script src="js/user-avatar.js"></script>
<script src="js/password-rules.js"></script>
<script src="js/login-id-rules.js"></script>
<script src="js/nickname-rules.js"></script>
<script src="js/email-code-rules.js"></script>
<script>
  const API_BASE = window.JURIN_API_BASE || 'http://localhost:5000';
  let currentUserId = null;
  let canChangePassword = true;
  let canChangeLoginId = true;
  let currentAvatarUrl = null;
  let savedUserSnapshot = null;
  let pendingAvatarFile = null;
  let pendingAvatarReset = false;
  let pendingAvatarBlobUrl = null;
  let loginIdCheckSeq = 0;
  let nicknameCheckSeq = 0;
  let loginIdDebounceTimer = null;
  let nicknameDebounceTimer = null;
  let emailSendCooldownLeft = 0;
  let emailSendCooldownTimer = null;

  const VERIFY_ERRORS = {
    email: 'mypageErrorEmail',
    emailCode: 'mypageErrorEmailCode',
    form: 'mypageErrorVerifyForm',
  };
  const EDIT_ERRORS = {
    loginId: 'mypageErrorLoginId',
    password: 'mypageErrorPassword',
    passwordConfirm: 'mypageErrorPasswordConfirm',
    nickname: 'mypageErrorNickname',
    form: 'mypageErrorEditForm',
  };

  function validatePasswordRules(password) {
    if (typeof jurinValidatePassword !== 'function') return { ok: true, message: '' };
    return jurinValidatePassword(password);
  }

  function validateLoginIdFormat(loginId) {
    if (typeof jurinValidateLoginId !== 'function') return { ok: true, message: '' };
    return jurinValidateLoginId(loginId);
  }

  function validateNicknameFormat(nickname) {
    if (typeof jurinValidateNickname !== 'function') return { ok: true, message: '' };
    return jurinValidateNickname(nickname);
  }

  function setPanelError(map, key, message, type) {
    const id = map[key];
    const el = id ? document.getElementById(id) : null;
    const msg = String(message || '').trim();
    if (!el) return;
    el.textContent = msg;
    el.classList.remove('is-visible', 'is-success');
    if (msg) {
      el.classList.add('is-visible');
      if (type === 'success') el.classList.add('is-success');
    }
  }

  function showLoading(show) {
    const el = document.getElementById('mypageLoading');
    if (el) el.hidden = !show;
  }

  function showLoginPrompt() {
    showLoading(false);
    document.getElementById('mypageVerifyPanel').hidden = true;
    document.getElementById('mypageEditPanel').hidden = true;
    document.getElementById('mypageLoginPrompt').hidden = false;
  }

  function showVerifyPanel() {
    showLoading(false);
    document.getElementById('mypageLoginPrompt').hidden = true;
    document.getElementById('mypageEditPanel').hidden = true;
    document.getElementById('mypageVerifyPanel').hidden = false;
  }

  function showEditPanel(user) {
    showLoading(false);
    document.getElementById('mypageLoginPrompt').hidden = true;
    document.getElementById('mypageVerifyPanel').hidden = true;
    document.getElementById('mypageEditPanel').hidden = false;
    if (user) fillEditForm(user);
  }

  function clearPendingAvatarBlob() {
    if (pendingAvatarBlobUrl) {
      URL.revokeObjectURL(pendingAvatarBlobUrl);
      pendingAvatarBlobUrl = null;
    }
  }

  function clearPendingAvatarState() {
    clearPendingAvatarBlob();
    pendingAvatarFile = null;
    pendingAvatarReset = false;
  }

  function getDefaultAvatarPreviewUrl(user) {
    const url = (user && user.defaultAvatarUrl) || (typeof JURIN_DEFAULT_AVATAR !== 'undefined' ? JURIN_DEFAULT_AVATAR : 'assets/profile/default-avatar.svg');
    return typeof jurinAvatarSrc === 'function' ? jurinAvatarSrc(url) : url;
  }

  function hasPendingAvatarChange() {
    return !!pendingAvatarFile || pendingAvatarReset;
  }

  function updateAvatarPreviewFromState() {
    const preview = document.getElementById('mypageAvatarPreview');
    if (!preview) return;
    const user = savedUserSnapshot || {};
    const displayName = user.nickname || user.loginId || '사용자';
    preview.alt = displayName + ' 프로필';
    preview.onerror = function () {
      this.onerror = null;
      this.src = typeof JURIN_DEFAULT_AVATAR !== 'undefined' ? JURIN_DEFAULT_AVATAR : 'assets/profile/default-avatar.svg';
    };

    if (pendingAvatarBlobUrl) {
      preview.src = pendingAvatarBlobUrl;
      preview.style.objectFit = 'cover';
      preview.style.objectPosition = 'center center';
      return;
    }
    if (pendingAvatarReset) {
      preview.src = getDefaultAvatarPreviewUrl(user);
      return;
    }

    if (user.hasCustomAvatar === false && user.defaultAvatarUrl) {
      preview.src = getDefaultAvatarPreviewUrl(user);
      return;
    }
    currentAvatarUrl = user.avatarUrl || null;
    if (typeof jurinApplyAvatarToElement === 'function') {
      jurinApplyAvatarToElement(preview, currentAvatarUrl, displayName);
    } else {
      preview.src = currentAvatarUrl || 'assets/profile/default-avatar.svg';
    }
  }

  function isGoogleAccount(user) {
    if (!user) return false;
    if (String(user.authProvider || '').trim().toLowerCase() === 'google') return true;
    return user.canChangeLoginId === false && user.canChangePassword === false;
  }

  function fillEditForm(user) {
    document.getElementById('mypageLoginId').value = user.loginId || '';
    document.getElementById('mypageNickname').value = user.nickname || '';
    document.getElementById('mypagePassword').value = '';
    document.getElementById('mypagePasswordConfirm').value = '';
    const googleAccount = isGoogleAccount(user);
    const canPw = !googleAccount && user.canChangePassword !== false;
    const canId = !googleAccount && user.canChangeLoginId !== false;
    canChangePassword = canPw;
    canChangeLoginId = canId;
    const editPanel = document.getElementById('mypageEditPanel');
    const editLead = document.getElementById('mypageEditLead');
    const withdrawPwSection = document.getElementById('mypageWithdrawPasswordSection');
    const loginIdInput = document.getElementById('mypageLoginId');
    if (editPanel) editPanel.classList.toggle('is-google', googleAccount);
    if (loginIdInput) loginIdInput.required = canId;
    if (editLead) {
      editLead.textContent = googleAccount
        ? '닉네임과 프로필 사진을 변경할 수 있습니다.'
        : '아이디·닉네임·비밀번호를 변경할 수 있습니다.';
    }
    if (withdrawPwSection) withdrawPwSection.hidden = !canPw;
    savedUserSnapshot = user;
    clearPendingAvatarState();
    updateAvatarPreviewFromState();
  }

  function applyUserToVerify(user) {
    document.getElementById('mypageEmail').value = user.email || '';
    currentUserId = user.userId != null ? user.userId : null;
    fillEditForm(user);
  }

  async function loadProfileStatus() {
    showLoading(true);
    try {
      const res = await fetch(`${API_BASE}/api/auth/profile/status`, { credentials: 'include' });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401 || !data.success) {
        showLoginPrompt();
        return;
      }
      const user = data.user || {};
      applyUserToVerify(user);
      if (data.verified) {
        showEditPanel(user);
      } else {
        showVerifyPanel();
      }
    } catch (_) {
      setPanelError(VERIFY_ERRORS, 'form', '서버에 연결할 수 없습니다.', 'error');
      showVerifyPanel();
    }
  }

  function updateSendEmailBtnLabel() {
    const btn = document.getElementById('mypageSendEmailCode');
    if (!btn) return;
    if (emailSendCooldownLeft > 0) {
      btn.disabled = true;
      btn.textContent = `${emailSendCooldownLeft}초`;
    } else {
      btn.disabled = false;
      btn.textContent = '발송하기';
    }
  }

  function startEmailSendCooldown(seconds) {
    emailSendCooldownLeft = Math.max(1, Math.floor(Number(seconds) || 60));
    updateSendEmailBtnLabel();
    clearInterval(emailSendCooldownTimer);
    emailSendCooldownTimer = setInterval(function () {
      emailSendCooldownLeft -= 1;
      if (emailSendCooldownLeft <= 0) {
        clearInterval(emailSendCooldownTimer);
        emailSendCooldownLeft = 0;
      }
      updateSendEmailBtnLabel();
    }, 1000);
  }

  async function sendProfileEmailCode() {
    setPanelError(VERIFY_ERRORS, 'form', '', '');
    const btn = document.getElementById('mypageSendEmailCode');
    if (btn) btn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/api/auth/profile/send-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({}),
      });
      const data = await res.json().catch(() => ({}));
      const msg = (data && data.message) ? String(data.message) : '';
      if (res.ok && data.success) {
        setPanelError(VERIFY_ERRORS, 'email', '인증코드를 이메일로 발송했습니다.', 'success');
        startEmailSendCooldown(60);
        return;
      }
      if (msg.indexOf('초 후') >= 0) {
        const m = msg.match(/(\d+)\s*초/);
        if (m) startEmailSendCooldown(parseInt(m[1], 10));
      }
      setPanelError(VERIFY_ERRORS, 'email', msg || '인증코드 발송에 실패했습니다.', 'error');
    } catch (_) {
      setPanelError(VERIFY_ERRORS, 'email', '서버에 연결할 수 없습니다.', 'error');
    } finally {
      if (emailSendCooldownLeft <= 0) updateSendEmailBtnLabel();
    }
  }

  function validateEmailCodeFormat(code) {
    if (typeof jurinValidateEmailCode === 'function') return jurinValidateEmailCode(code);
    const c = String(code || '').trim();
    if (!c) return { ok: false, message: '인증코드를 입력해주세요.' };
    if (!/^\d{6}$/.test(c)) return { ok: false, message: '인증코드 6자리를 다시 입력해주세요.' };
    return { ok: true, message: '' };
  }

  async function submitProfileVerify(event) {
    event.preventDefault();
    setPanelError(VERIFY_ERRORS, 'form', '', '');
    const code = document.getElementById('mypageEmailCode').value.trim();
    const rules = validateEmailCodeFormat(code);
    if (!rules.ok) {
      setPanelError(VERIFY_ERRORS, 'emailCode', rules.message, 'error');
      return;
    }
    const btn = document.getElementById('mypageVerifySubmitBtn');
    if (btn) btn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/api/auth/profile/verify-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ emailCode: code }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.success) {
        setPanelError(VERIFY_ERRORS, 'emailCode', '', '');
        await loadProfileStatus();
        return;
      }
      const field = data.field === 'emailCode' ? 'emailCode' : 'form';
      setPanelError(VERIFY_ERRORS, field, data.message || '인증에 실패했습니다.', 'error');
    } catch (_) {
      setPanelError(VERIFY_ERRORS, 'form', '서버에 연결할 수 없습니다.', 'error');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  function normalizedLoginId() {
    const raw = document.getElementById('mypageLoginId').value;
    if (typeof jurinNormalizeLoginId === 'function') return jurinNormalizeLoginId(raw);
    return String(raw || '').trim();
  }

  function normalizedNickname() {
    const raw = document.getElementById('mypageNickname').value;
    if (typeof jurinNormalizeNickname === 'function') return jurinNormalizeNickname(raw);
    return String(raw || '').trim();
  }

  function normalizedPassword(value) {
    const raw = value != null ? value : document.getElementById('mypagePassword').value;
    if (typeof jurinNormalizePassword === 'function') return jurinNormalizePassword(raw);
    return String(raw || '').trim();
  }

  async function checkLoginIdDuplicate() {
    const loginIdRaw = document.getElementById('mypageLoginId').value;
    if (!loginIdRaw.trim()) {
      setPanelError(EDIT_ERRORS, 'loginId', '', '');
      return true;
    }
    const fmt = validateLoginIdFormat(loginIdRaw);
    if (!fmt.ok) {
      setPanelError(EDIT_ERRORS, 'loginId', fmt.message, 'error');
      return false;
    }
    const seq = ++loginIdCheckSeq;
    const body = { loginId: normalizedLoginId() };
    if (currentUserId != null) body.excludeUserId = currentUserId;
    try {
      const res = await fetch(`${API_BASE}/api/auth/check-login-id`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (seq !== loginIdCheckSeq) return true;
      if (data.available) {
        setPanelError(EDIT_ERRORS, 'loginId', '', '');
        return true;
      }
      setPanelError(EDIT_ERRORS, 'loginId', data.message || '이미 사용 중인 아이디입니다.', 'error');
      return false;
    } catch (_) {
      return true;
    }
  }

  async function checkNicknameDuplicate() {
    const nickname = document.getElementById('mypageNickname').value;
    if (!nickname) {
      setPanelError(EDIT_ERRORS, 'nickname', '', '');
      return true;
    }
    const fmt = validateNicknameFormat(nickname);
    if (!fmt.ok) {
      setPanelError(EDIT_ERRORS, 'nickname', fmt.message, 'error');
      return false;
    }
    const seq = ++nicknameCheckSeq;
    const body = { nickname: normalizedNickname() };
    if (currentUserId != null) body.excludeUserId = currentUserId;
    try {
      const res = await fetch(`${API_BASE}/api/auth/check-nickname`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (seq !== nicknameCheckSeq) return true;
      if (data.available) {
        setPanelError(EDIT_ERRORS, 'nickname', '', '');
        return true;
      }
      setPanelError(EDIT_ERRORS, 'nickname', data.message || '중복된 닉네임입니다.', 'error');
      return false;
    } catch (_) {
      return true;
    }
  }

  function validatePasswordFieldsOptional() {
    if (!canChangePassword) return true;
    const password = document.getElementById('mypagePassword').value;
    const passwordConfirm = document.getElementById('mypagePasswordConfirm').value;
    if (!password && !passwordConfirm) {
      setPanelError(EDIT_ERRORS, 'password', '', '');
      setPanelError(EDIT_ERRORS, 'passwordConfirm', '', '');
      return true;
    }
    let ok = true;
    const rules = validatePasswordRules(password);
    if (!rules.ok) {
      setPanelError(EDIT_ERRORS, 'password', rules.message, 'error');
      ok = false;
    } else {
      setPanelError(EDIT_ERRORS, 'password', '', '');
    }
    if (!passwordConfirm) {
      setPanelError(EDIT_ERRORS, 'passwordConfirm', '비밀번호 확인을 입력해주세요.', 'error');
      return false;
    }
    const confirmRules = validatePasswordRules(passwordConfirm);
    if (!confirmRules.ok) {
      setPanelError(EDIT_ERRORS, 'passwordConfirm', confirmRules.message, 'error');
      return false;
    }
    if (normalizedPassword(password) !== normalizedPassword(passwordConfirm)) {
      setPanelError(EDIT_ERRORS, 'passwordConfirm', '비밀번호가 일치하지 않습니다.', 'error');
      return false;
    }
    setPanelError(EDIT_ERRORS, 'passwordConfirm', '비밀번호가 일치합니다.', 'success');
    return ok;
  }

  async function previewProfileAvatarFile(file) {
    const avatarError = document.getElementById('mypageErrorAvatar');
    if (avatarError) {
      avatarError.textContent = '';
      avatarError.classList.remove('is-visible', 'is-success');
    }
    clearPendingAvatarBlob();
    pendingAvatarFile = null;
    pendingAvatarReset = false;

    let preparedFile = file;
    try {
      if (typeof jurinCropAvatarFileToSquare === 'function') {
        preparedFile = await jurinCropAvatarFileToSquare(file, 1024);
      }
    } catch (_) {
      if (avatarError) {
        avatarError.textContent = '이미지를 불러오지 못했습니다. 다른 사진으로 다시 시도해 주세요.';
        avatarError.classList.add('is-visible');
      }
      return;
    }

    pendingAvatarFile = preparedFile;
    pendingAvatarBlobUrl = URL.createObjectURL(preparedFile);
    updateAvatarPreviewFromState();
  }

  function previewProfileAvatarReset() {
    const avatarError = document.getElementById('mypageErrorAvatar');
    if (avatarError) {
      avatarError.textContent = '';
      avatarError.classList.remove('is-visible', 'is-success');
    }
    clearPendingAvatarBlob();
    pendingAvatarFile = null;
    pendingAvatarReset = true;
    updateAvatarPreviewFromState();
  }

  async function savePendingAvatarChanges() {
    if (!hasPendingAvatarChange()) return { ok: true, user: null };

    const avatarError = document.getElementById('mypageErrorAvatar');
    try {
      if (pendingAvatarFile) {
        const formData = new FormData();
        formData.append('image', pendingAvatarFile);
        const res = await fetch(`${API_BASE}/api/auth/profile/avatar`, {
          method: 'POST',
          credentials: 'include',
          body: formData,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.success) {
          const msg = data.message || '프로필 사진 저장에 실패했습니다.';
          if (avatarError) {
            avatarError.textContent = msg;
            avatarError.classList.add('is-visible');
          }
          return { ok: false, message: msg };
        }
        return { ok: true, user: data.user || null };
      }

      if (pendingAvatarReset) {
        const hadCustom = !!(savedUserSnapshot && savedUserSnapshot.hasCustomAvatar);
        if (!hadCustom) {
          return { ok: true, user: null };
        }
        const res = await fetch(`${API_BASE}/api/auth/profile/avatar`, {
          method: 'DELETE',
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.success) {
          const msg = data.message || '프로필 사진 변경에 실패했습니다.';
          if (avatarError) {
            avatarError.textContent = msg;
            avatarError.classList.add('is-visible');
          }
          return { ok: false, message: msg };
        }
        return { ok: true, user: data.user || null };
      }
    } catch (_) {
      if (avatarError) {
        avatarError.textContent = '서버에 연결할 수 없습니다.';
        avatarError.classList.add('is-visible');
      }
      return { ok: false, message: '서버에 연결할 수 없습니다.' };
    }
    return { ok: true, user: null };
  }

  function openWithdrawModal() {
    const modal = document.getElementById('mypageWithdrawModal');
    const pwInput = document.getElementById('mypageWithdrawPassword');
    if (pwInput) pwInput.value = '';
    setPanelError({ form: 'mypageErrorWithdrawForm', password: 'mypageErrorWithdrawPassword' }, 'form', '', '');
    setPanelError({ form: 'mypageErrorWithdrawForm', password: 'mypageErrorWithdrawPassword' }, 'password', '', '');
    if (modal) {
      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden', 'false');
    }
  }

  function closeWithdrawModal() {
    const modal = document.getElementById('mypageWithdrawModal');
    if (modal) {
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
    }
  }

  async function submitAccountWithdraw() {
    const WITHDRAW_ERRORS = { form: 'mypageErrorWithdrawForm', password: 'mypageErrorWithdrawPassword' };
    setPanelError(WITHDRAW_ERRORS, 'form', '', '');
    setPanelError(WITHDRAW_ERRORS, 'password', '', '');
    const body = { confirm: true };
    if (canChangePassword) {
      const password = document.getElementById('mypageWithdrawPassword').value;
      if (!password) {
        setPanelError(WITHDRAW_ERRORS, 'password', '비밀번호를 입력해주세요.', 'error');
        return;
      }
      body.password = typeof jurinNormalizePassword === 'function'
        ? jurinNormalizePassword(password)
        : String(password || '').trim();
    }
    const btn = document.getElementById('mypageWithdrawConfirmBtn');
    if (btn) btn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/api/auth/account`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.success) {
        closeWithdrawModal();
        sessionStorage.removeItem('jurinUserEmail');
        sessionStorage.removeItem('jurinUserNickname');
        sessionStorage.removeItem('jurinUserLoginId');
        sessionStorage.removeItem('jurinUserAvatarUrl');
        if (window.parent && typeof window.parent.closeMypageModal === 'function') {
          window.parent.closeMypageModal();
        }
        if (window.parent && typeof window.parent.refreshAuthNav === 'function') {
          await window.parent.refreshAuthNav();
        } else if (window.parent) {
          window.parent.location.reload();
        }
        return;
      }
      const field = data.field === 'password' ? 'password' : 'form';
      setPanelError(WITHDRAW_ERRORS, field, data.message || '회원 탈퇴에 실패했습니다.', 'error');
    } catch (_) {
      setPanelError(WITHDRAW_ERRORS, 'form', '서버에 연결할 수 없습니다.', 'error');
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function validateEditForm() {
    setPanelError(EDIT_ERRORS, 'form', '', '');
    let ok = true;
    const loginIdRaw = document.getElementById('mypageLoginId').value;
    const nickname = document.getElementById('mypageNickname').value;

    if (canChangeLoginId) {
      if (!loginIdRaw.trim()) {
        setPanelError(EDIT_ERRORS, 'loginId', '아이디를 입력해주세요.', 'error');
        ok = false;
      } else {
        const idRules = validateLoginIdFormat(loginIdRaw);
        if (!idRules.ok) {
          setPanelError(EDIT_ERRORS, 'loginId', idRules.message, 'error');
          ok = false;
        }
      }
    }

    const nickRules = validateNicknameFormat(nickname);
    if (!nickRules.ok) {
      setPanelError(EDIT_ERRORS, 'nickname', nickRules.message, 'error');
      ok = false;
    }

    if (!validatePasswordFieldsOptional()) ok = false;
    if (!ok) return false;

    if (!(await checkNicknameDuplicate())) return false;
    if (canChangeLoginId && !(await checkLoginIdDuplicate())) return false;
    return true;
  }

  function profileFieldsChanged() {
    const snapshot = savedUserSnapshot || {};
    const nickname = normalizedNickname();
    if (nickname !== String(snapshot.nickname || '').trim()) return true;
    if (canChangeLoginId) {
      const loginId = normalizedLoginId();
      if (loginId !== String(snapshot.loginId || '').trim()) return true;
    }
    if (canChangePassword) {
      const password = document.getElementById('mypagePassword').value;
      const passwordConfirm = document.getElementById('mypagePasswordConfirm').value;
      if (String(password || '').trim() || String(passwordConfirm || '').trim()) return true;
    }
    return false;
  }

  function scrollToEditFormMessage() {
    const el = document.getElementById('mypageErrorEditForm');
    if (el && typeof el.scrollIntoView === 'function') {
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function broadcastMypageSaved(updatedUser) {
    const payload = { type: 'jurin:mypage-saved', user: updatedUser };
    const targets = [];
    if (window.parent && window.parent !== window) targets.push(window.parent);
    if (window.top && window.top !== window && targets.indexOf(window.top) < 0) {
      targets.push(window.top);
    }
    targets.forEach(function (target) {
      try {
        target.postMessage(payload, '*');
      } catch (_) { /* ignore */ }
    });
  }

  function tryCloseParentMypageUi() {
    try {
      if (!window.parent || window.parent === window) return false;
      const owner = window.parent;
      const modal = owner.document.getElementById('mypageModal');
      if (!modal) return false;
      modal.classList.remove('is-open');
      modal.setAttribute('aria-hidden', 'true');
      const frame = owner.document.getElementById('mypageModalFrame');
      if (frame) frame.src = 'about:blank';
      if (typeof owner.updateBodyScrollLock === 'function') owner.updateBodyScrollLock();
      return true;
    } catch (_) {
      return false;
    }
  }

  function notifyParentProfileRefresh(updatedUser) {
    try {
      if (window.parent && window.parent !== window && typeof window.parent.finishMypageSuccess === 'function') {
        window.parent.finishMypageSuccess(updatedUser);
        return;
      }
    } catch (_) { /* ignore */ }
    try {
      if (window.top && window.top !== window && typeof window.top.finishMypageSuccess === 'function') {
        window.top.finishMypageSuccess(updatedUser);
        return;
      }
    } catch (_) { /* ignore */ }
    try {
      const owner = window.parent && window.parent !== window ? window.parent : null;
      if (owner && typeof owner.refreshAuthNav === 'function') {
        owner.refreshAuthNav().catch(function () {});
      }
    } catch (_) { /* ignore */ }
  }

  function persistSavedUserToSession(user) {
    if (!user) return;
    const email = (user.email || '').trim();
    const nickname = (user.nickname || '').trim();
    const loginId = (user.loginId || '').trim();
    if (email) sessionStorage.setItem('jurinUserEmail', email);
    if (nickname) sessionStorage.setItem('jurinUserNickname', nickname);
    if (loginId) sessionStorage.setItem('jurinUserLoginId', loginId);
    let avatarUrl = '';
    if (user.hasCustomAvatar === false && user.defaultAvatarUrl) {
      avatarUrl = String(user.defaultAvatarUrl || '').trim();
    } else {
      avatarUrl = String(user.avatarUrl || '').trim();
    }
    if (avatarUrl) sessionStorage.setItem('jurinUserAvatarUrl', avatarUrl);
    else sessionStorage.removeItem('jurinUserAvatarUrl');
  }

  function exitMypageAfterSave(updatedUser) {
    persistSavedUserToSession(updatedUser);

    const inIframe = window.parent && window.parent !== window;
    if (inIframe) {
      broadcastMypageSaved(updatedUser);
      tryCloseParentMypageUi();
      notifyParentProfileRefresh(updatedUser);

      try {
        if (typeof window.parent.closeMypageModal === 'function') {
          window.parent.closeMypageModal();
        }
      } catch (_) { /* ignore */ }

      if (tryCloseParentMypageUi()) return;

      try {
        const owner = window.parent;
        owner.location.href = new URL('주린닷컴홈피.html', owner.location.href).href;
        return;
      } catch (_) { /* fall through */ }
    }

    window.location.replace(new URL('주린닷컴홈피.html', window.location.href).href);
  }

  async function submitProfileSave(event) {
    event.preventDefault();
    try {
      if (!(await validateEditForm())) return;
    } catch (err) {
      setPanelError(EDIT_ERRORS, 'form', '입력값을 확인할 수 없습니다. 페이지를 새로고침 후 다시 시도해주세요.', 'error');
      scrollToEditFormMessage();
      return;
    }

    if (!profileFieldsChanged() && !hasPendingAvatarChange()) {
      setPanelError(EDIT_ERRORS, 'form', '변경된 내용이 없습니다.', 'error');
      scrollToEditFormMessage();
      return;
    }

    const btn = document.getElementById('mypageSaveBtn');
    if (btn) btn.disabled = true;
    setPanelError(EDIT_ERRORS, 'form', '저장하는 중입니다…', 'success');

    try {
      let updatedUser = savedUserSnapshot;

      if (profileFieldsChanged()) {
        const body = {
          nickname: normalizedNickname(),
        };
        if (canChangeLoginId) {
          body.loginId = normalizedLoginId();
        }
        if (canChangePassword) {
          const password = document.getElementById('mypagePassword').value;
          const passwordConfirm = document.getElementById('mypagePasswordConfirm').value;
          if (password || passwordConfirm) {
            body.password = normalizedPassword(password);
            body.passwordConfirm = normalizedPassword(passwordConfirm);
          }
        }

        const res = await fetch(`${API_BASE}/api/auth/profile`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!(res.ok && data.success && data.user)) {
          const field = data.field && EDIT_ERRORS[data.field] ? data.field : 'form';
          const msg = data.message || '저장에 실패했습니다.';
          setPanelError(EDIT_ERRORS, field, msg, 'error');
          scrollToEditFormMessage();
          return;
        }
        updatedUser = data.user;
        savedUserSnapshot = updatedUser;
      }

      if (hasPendingAvatarChange()) {
        const avatarResult = await savePendingAvatarChanges();
        if (!avatarResult.ok) {
          setPanelError(EDIT_ERRORS, 'form', avatarResult.message || '프로필 사진 저장에 실패했습니다.', 'error');
          scrollToEditFormMessage();
          return;
        }
        if (avatarResult.user) {
          updatedUser = avatarResult.user;
        }
      }

      clearPendingAvatarState();
      savedUserSnapshot = updatedUser;
      exitMypageAfterSave(updatedUser);
    } catch (_) {
      setPanelError(EDIT_ERRORS, 'form', '서버에 연결할 수 없습니다.', 'error');
      scrollToEditFormMessage();
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  document.getElementById('mypageAvatarUploadBtn').addEventListener('click', function () {
    document.getElementById('mypageAvatarFile').click();
  });
  document.getElementById('mypageAvatarFile').addEventListener('change', function (event) {
    const file = event.target.files && event.target.files[0];
    event.target.value = '';
    if (file) previewProfileAvatarFile(file);
  });
  document.getElementById('mypageAvatarResetBtn').addEventListener('click', previewProfileAvatarReset);
  document.getElementById('mypageWithdrawOpenBtn').addEventListener('click', openWithdrawModal);
  document.getElementById('mypageWithdrawCancelBtn').addEventListener('click', closeWithdrawModal);
  document.getElementById('mypageWithdrawConfirmBtn').addEventListener('click', submitAccountWithdraw);
  document.getElementById('mypageWithdrawModal').addEventListener('click', function (event) {
    if (event.target === event.currentTarget) closeWithdrawModal();
  });
  document.getElementById('mypageSendEmailCode').addEventListener('click', sendProfileEmailCode);
  document.getElementById('mypageLoginId').addEventListener('input', function () {
    clearTimeout(loginIdDebounceTimer);
    loginIdDebounceTimer = setTimeout(checkLoginIdDuplicate, 400);
  });
  document.getElementById('mypageNickname').addEventListener('input', function () {
    clearTimeout(nicknameDebounceTimer);
    nicknameDebounceTimer = setTimeout(checkNicknameDuplicate, 400);
  });
  document.getElementById('mypagePasswordConfirm').addEventListener('blur', validatePasswordFieldsOptional);
  document.getElementById('mypageOpenLoginBtn').addEventListener('click', function () {
    if (window.parent && typeof window.parent.openLoginModal === 'function') {
      window.parent.closeMypageModal();
      window.parent.openLoginModal();
    }
  });

  window.submitProfileSave = submitProfileSave;

  loadProfileStatus();
</script>

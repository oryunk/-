<style>
  .product-page {
    min-height: 100vh;
    background: linear-gradient(180deg, #f6fbf8 0%, #ffffff 100%);
  }

  .product-shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 36px 40px 64px;
  }

  .product-hero {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.14);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 18px 44px rgba(23, 43, 32, 0.05);
  }

  .product-title {
    margin: 0 0 10px;
    font-size: 34px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.03em;
  }

  .product-sub {
    margin: 0;
    max-width: 820px;
    font-size: 15px;
    line-height: 1.85;
    color: var(--gray-500);
  }

  .product-summary {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 16px;
    background: linear-gradient(180deg, #f8fcf9 0%, #eff8f2 100%);
    border: 1px solid rgba(47, 143, 95, 0.12);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.7;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    margin-top: 22px;
  }

  .product-card {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.14);
    border-radius: 20px;
    padding: 22px;
  }

  .product-card-title {
    margin: 0 0 12px;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
  }

  .product-card-text {
    margin: 0;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-primary);
  }

  .product-list {
    margin: 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 10px;
  }

  .product-list li {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.65;
  }

  .product-list li::before {
    content: '•';
    color: var(--accent);
    font-weight: 900;
  }

  .product-example {
    margin-top: 18px;
    padding: 18px;
    border-radius: 18px;
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.14);
  }

  .product-example-title {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 800;
    color: var(--text-primary);
  }

  .product-example-text {
    margin: 0;
    font-size: 14px;
    line-height: 1.75;
    color: var(--gray-500);
  }

  .product-footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  .product-footer-link {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: var(--accent);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(47, 143, 95, 0.08);
    border: 1px solid rgba(47, 143, 95, 0.18);
  }

  .product-footer-link:hover {
    background: rgba(47, 143, 95, 0.14);
  }

  @media (max-width: 900px) {
    .product-shell {
      padding: 28px 18px 48px;
    }

    .product-hero {
      padding: 22px;
      border-radius: 20px;
    }

    .product-title {
      font-size: 28px;
    }

    .product-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  const PRODUCT_TOPICS = {
    elw: {
      title: 'ELW',
      subtitle:
        '주식워런트증권(ELW, Equity Linked Warrant)은 개별 주식·주가지수 등을 기초자산으로 하여, 기초자산 가격 변동에 따라 투자수익이 결정되는 파생결합증권입니다. 만기에 정해진 행사가격으로 기초자산을 매수(콜)하거나 매도(풋)할 수 있는 권리를 부여하며, 옵션과 유사한 구조를 갖는 유가증권입니다.',
      summary: '',
      purpose: '기초자산의 상승이나 하락 전망을 더 크게 반영해 보고 싶을 때 쓰여요. 같은 방향을 보더라도 일반 주식보다 훨씬 예민하게 움직일 수 있고, 정해진 만기 안에서만 의미가 있다는 점이 핵심이에요.',
      when: [
        '특정 종목이나 지수가 짧게 강하게 움직일 것 같다고 볼 때',
        '적은 자금으로도 큰 가격 변화를 노리고 싶을 때',
        '일반 주식보다 더 강한 방향성 상품을 이해해 보고 싶을 때'
      ],
      cautions: [
        '방향이 맞아도 시간이 지나면 가치가 줄 수 있어요.',
        '만기가 가까울수록 가격이 더 예민해질 수 있어요.',
        '수익 기회가 큰 만큼 손실 속도도 매우 빠를 수 있어요.'
      ],
      functions: [
        '오를 것 같으면 콜, 내릴 것 같으면 풋처럼 방향성 도구로 봐요.',
        '짧은 시세 움직임을 크게 반영하는 구조라는 점이 가장 큰 기능이에요.',
        '초보 단계에서는 구조를 익히고 왜 위험한지부터 이해하는 게 우선이에요.'
      ],
      example: '예를 들어 어떤 대형주가 단기간에 강하게 오를 것 같다고 보면 ELW를 함께 볼 수 있어요. 다만 예상과 반대로 가거나 시간이 오래 끌리면 손실이 일반 주식보다 훨씬 빨라질 수 있습니다.',
      links: [
        { label: 'ELW 용어 보기', href: 'glossary.html?term=ELW' },
        { label: '만기 용어 보기', href: 'glossary.html?term=%EB%A7%8C%EA%B8%B0' },
        { label: '시간가치 보기', href: 'glossary.html?term=%EC%8B%9C%EA%B0%84%EA%B0%80%EC%B9%98' }
      ]
    },
    bonds: {
      title: '채권',
      subtitle:
        '채권은 정부나 기업에 돈을 빌려주고, 정해진 이자와 만기 원금을 받는 투자 상품입니다.',
      summary: '',
      purpose: '정해진 이자와 만기를 기준으로 비교적 안정적인 자금 운용을 볼 때 쓰여요. 주식과 다른 이유로 움직이기 때문에 자산을 나눠 담는 용도로도 많이 봐요.',
      when: [
        '변동성이 큰 장에서 조금 더 덜 흔들리는 자산을 보고 싶을 때',
        '정해진 이자 흐름이나 만기 구조를 기준으로 판단하고 싶을 때',
        '주식과 다른 성격의 자산을 함께 가져가고 싶을 때'
      ],
      cautions: [
        '금리가 오르면 기존 채권 가격은 약해질 수 있어요.',
        '안정적인 편이라도 발행자의 신용 위험은 따로 봐야 해요.',
        '예금처럼 보일 수 있지만 가격은 시장 상황에 따라 움직일 수 있어요.'
      ],
      functions: [
        '돈을 빌려주고 이자를 받는 구조로 이해하면 가장 쉬워요.',
        '주식과 다른 이유로 움직여 분산 투자 관점에서 자주 활용돼요.',
        '초보 단계에서는 금리와 반대로 움직일 수 있다는 감만 익혀도 충분해요.'
      ],
      example: '예를 들어 금리가 내려갈 가능성을 보거나, 주식보다 덜 흔들리는 자산을 찾을 때 채권을 같이 볼 수 있어요. 다만 채권도 금리 변화와 신용도에 따라 가격이 움직인다는 점은 기억해야 합니다.',
      links: [
        { label: '채권 용어 보기', href: 'glossary.html?term=%EC%B1%84%EA%B6%8C' },
        { label: 'YTM 보기', href: 'glossary.html?term=YTM' },
        { label: '듀레이션 보기', href: 'glossary.html?term=%EB%93%80%EB%A0%88%EC%9D%B4%EC%85%98' }
      ]
    }
  };

  function currentTopic() {
    try {
      const params = new URLSearchParams(window.location.search);
      const topic = (params.get('topic') || 'elw').toLowerCase();
      return PRODUCT_TOPICS[topic] ? topic : 'elw';
    } catch (e) {
      return 'elw';
    }
  }

  function renderList(targetId, items) {
    const root = document.getElementById(targetId);
    if (!root) return;
    root.innerHTML = (items || []).map(function (item) {
      return '<li>' + item + '</li>';
    }).join('');
  }

  function currentElwTab() {
    try {
      var params = new URLSearchParams(window.location.search);
      var tab = (params.get('tab') || 'payoff').toLowerCase();
      if (window.ElwGuide && typeof ElwGuide.normalizeTab === 'function') {
        return ElwGuide.normalizeTab(tab);
      }
      return tab === 'use' || tab === 'risk' ? tab : 'payoff';
    } catch (e) {
      return 'payoff';
    }
  }

  function currentBondsTab() {
    try {
      var params = new URLSearchParams(window.location.search);
      var tab = (params.get('tab') || 'flow').toLowerCase();
      if (window.BondsGuide && typeof BondsGuide.normalizeTab === 'function') {
        return BondsGuide.normalizeTab(tab);
      }
      return tab === 'types' || tab === 'risk' ? tab : 'flow';
    } catch (e) {
      return 'flow';
    }
  }

  function renderProductPage(topicKey) {
    const topic = PRODUCT_TOPICS[topicKey] || PRODUCT_TOPICS.elw;
    const isElw = topicKey === 'elw';
    const isBonds = topicKey === 'bonds';

    document.title = (isElw ? 'ELW' : '채권') + ' - 주린닷컴';
    document.body.classList.toggle('product-topic-elw', isElw);
    document.body.classList.toggle('product-topic-bonds', !isElw);

    document.getElementById('productTitle').textContent = topic.title;
    document.getElementById('productSubtitle').textContent = topic.subtitle;

    const summaryEl = document.getElementById('productSummary');
    if (summaryEl) {
      summaryEl.textContent = topic.summary || '';
      summaryEl.hidden = isElw || isBonds || !topic.summary;
    }
    document.getElementById('productPurpose').textContent = topic.purpose;
    document.getElementById('productExample').textContent = topic.example;
    renderList('productWhenList', topic.when);
    renderList('productCautionList', topic.cautions);
    renderList('productFunctionList', topic.functions);

    const footerLinks = document.getElementById('productFooterLinks');
    footerLinks.innerHTML = (topic.links || []).map(function (link) {
      return '<a class="product-footer-link" href="' + link.href + '">' + link.label + '</a>';
    }).join('');

    const grid = document.getElementById('productGrid');
    const exampleSection = document.getElementById('productExampleSection');
    const elwRoot = document.getElementById('elwGuideRoot');
    const bondsRoot = document.getElementById('bondsGuideRoot');

    if (grid) grid.hidden = isBonds ? true : false;
    if (exampleSection) exampleSection.hidden = isElw || isBonds;

    if (isElw && elwRoot && window.ElwGuide) {
      elwRoot.hidden = false;
      ElwGuide.mount('elwGuideRoot', { tab: currentElwTab() });
    } else if (elwRoot) {
      elwRoot.hidden = true;
      elwRoot.innerHTML = '';
    }

    if (isBonds && bondsRoot && window.BondsGuide) {
      bondsRoot.hidden = false;
      BondsGuide.mount('bondsGuideRoot', { tab: currentBondsTab() });
    } else if (bondsRoot) {
      bondsRoot.hidden = true;
      bondsRoot.innerHTML = '';
    }

    document.getElementById('navElwLink').classList.toggle('active', isElw);
    document.getElementById('navBondsLink').classList.toggle('active', !isElw);
  }

  renderProductPage(currentTopic());
</script>

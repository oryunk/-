<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 뉴스 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260428">
<link rel="stylesheet" href="css/news-overlay.css">
<style>
  .market-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .market-header {
    background: linear-gradient(180deg, #f0f7f3 0%, #ffffff 100%);
    padding: 40px 0;
    border-bottom: 1px solid rgba(47, 143, 95, 0.15);
  }

  .market-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .market-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .market-sub {
    font-size: 16px;
    color: #3f5a4b;
    font-weight: 600;
  }

  .market-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .indices-section {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.16);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .indices-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  .indices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .index-card {
    background: var(--gray-100);
    border: 1px solid rgba(47, 143, 95, 0.12);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  .index-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .index-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .index-change {
    font-size: 16px;
    font-weight: 600;
  }

  .index-change.up {
    color: var(--up);
  }

  .index-change.down {
    color: var(--down);
  }

  .stocks-section {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.16);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .stocks-filter {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    padding: 8px 16px;
    background: rgba(47, 143, 95, 0.08);
    border: 1px solid rgba(47, 143, 95, 0.2);
    border-radius: 20px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-btn:hover {
    background: rgba(47, 143, 95, 0.14);
    border-color: rgba(47, 143, 95, 0.35);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 16px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(47, 143, 95, 0.1);
  }

  .stocks-table th {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stocks-table td {
    font-size: 15px;
    color: var(--text-primary);
  }

  .stock-name {
    font-weight: 600;
    color: var(--text-primary);
  }

  .stock-price {
    font-weight: 700;
    color: var(--accent);
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--up);
  }

  .stock-change.down {
    color: var(--down);
  }

  .stock-volume {
    color: var(--gray-200);
  }

  .market-news {
    background: #ffffff;
    border: 1px solid rgba(47, 143, 95, 0.16);
    border-radius: 16px;
    padding: 32px;
    scroll-margin-top: 90px;
  }

  .news-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  .news-list {
    display: grid;
    gap: 16px;
  }

  .news-item {
    display: flex;
    gap: 16px;
    padding: 18px;
    background: #ffffff;
    border-radius: 12px;
    border: 1px solid rgba(47, 143, 95, 0.18);
    cursor: pointer;
    transition: all 0.2s;
  }

  .news-item.news-link {
    text-decoration: none;
    color: inherit;
  }

  button.news-item {
    width: 100%;
    box-sizing: border-box;
    margin: 0;
    text-align: left;
    font: inherit;
    color: inherit;
    background: #ffffff;
    -webkit-tap-highlight-color: transparent;
  }

  button.news-item:focus-visible {
    outline: 2px solid var(--accent, #4f9eff);
    outline-offset: 2px;
  }

  .news-image.news-image--thumb {
    padding: 0;
    overflow: hidden;
  }

  .news-image.news-image--thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .news-empty {
    margin: 0;
    padding: 24px;
    text-align: center;
    color: #5b7566;
    font-weight: 600;
  }

  .news-item:hover {
    background: #f7fcf9;
    border-color: rgba(47, 143, 95, 0.45);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(31, 47, 38, 0.08);
  }

  .news-image {
    width: 80px;
    height: 80px;
    background: #e8f6ee;
    border: 1px solid rgba(47, 143, 95, 0.28);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: #1f6d47;
    flex-shrink: 0;
  }

  .news-content {
    flex: 1;
  }

  .news-category {
    display: inline-flex;
    align-items: center;
    font-size: 12px;
    color: #185f3d;
    background: #e7f5ed;
    border: 1px solid rgba(47, 143, 95, 0.3);
    border-radius: 999px;
    padding: 3px 9px;
    font-weight: 800;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .news-headline {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .news-summary {
    font-size: 14px;
    color: #3e5849;
    font-weight: 500;
    line-height: 1.5;
  }

  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .news-time {
    font-size: 12px;
    color: #5b7566;
    font-weight: 600;
  }

  .news-source {
    font-size: 12px;
    color: #204f38;
    background: #eaf7f0;
    border: 1px solid rgba(47, 143, 95, 0.22);
    padding: 4px 9px;
    border-radius: 12px;
    font-weight: 700;
  }

  .btn-back {
    background: rgba(79, 158, 255, 0.2);
    border: 1px solid rgba(79, 158, 255, 0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .btn-back:hover {
    background: rgba(79, 158, 255, 0.3);
    border-color: rgba(79, 158, 255, 0.6);
  }

  @media (max-width: 768px) {
    .stocks-table {
      font-size: 14px;
    }

    .stocks-table th,
    .stocks-table td {
      padding: 12px 8px;
    }

    .news-item {
      flex-direction: column;
      gap: 12px;
    }

    .news-image {
      width: 100%;
      height: 60px;
    }
  }
</style>
</head>

<div id="newsReaderOverlay" class="news-reader-overlay" aria-hidden="true">
  <div class="news-reader-backdrop" id="newsReaderBackdrop" aria-hidden="true"></div>
  <div class="news-reader-panel" role="dialog" aria-modal="true" aria-labelledby="newsReaderTitle">
    <button type="button" class="news-reader-close" id="newsReaderCloseBtn" aria-label="닫기">×</button>
    <div class="news-reader-header">
      <span class="news-reader-source" id="newsReaderSource"></span>
      <span class="news-reader-date" id="newsReaderDate"></span>
    </div>
    <h2 class="news-reader-title" id="newsReaderTitle"></h2>
    <div class="news-reader-image-wrap" id="newsReaderImageWrap">
      <img id="newsReaderImage" class="news-reader-image" src="" alt="" style="display:none;">
      <div class="news-reader-image-placeholder" id="newsReaderImagePlaceholder" style="display:none;" aria-hidden="true">

        <span class="news-reader-image-placeholder-label">대표 이미지가 없는 기사입니다</span>

      </div>
    </div>
    <div class="news-reader-lead" id="newsReaderLead"></div>
    <div class="news-reader-digest-section">

<!DOCTYPE html>
<!-- 비밀번호 재설정(일반 가입 계정). -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="assets/brand/favicon.ico?v=20260607" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32x32.png?v=20260607">
<link rel="apple-touch-icon" sizes="180x180" href="assets/brand/apple-touch-icon.png?v=20260607">
<title>비밀번호 재설정 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260428">
<style>
  .helper-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    background: radial-gradient(circle at top right, rgba(47, 143, 95, 0.12), transparent 32%),
      radial-gradient(circle at bottom left, rgba(47, 143, 95, 0.08), transparent 38%), #ffffff; }
  .helper-card { width: min(100%, 500px); padding: 36px; border-radius: 24px; border: 1px solid rgba(47, 143, 95, 0.18);
    background: #fff; box-shadow: 0 20px 60px rgba(31, 47, 38, 0.1); }
  .helper-card h1 { font-size: 30px; margin-bottom: 10px; color: var(--text-primary); }
  .helper-card p { color: var(--gray-400); line-height: 1.7; font-size: 14px; margin-bottom: 24px; }
  .helper-card label { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 600; }
  .helper-card input { width: 100%; padding: 14px 16px; border-radius: 10px; border: 1px solid rgba(47, 143, 95, 0.22);
    background: var(--gray-100); font-size: 14px; font-family: inherit; }
  .helper-card button { width: 100%; border: none; border-radius: 10px; padding: 14px 18px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent)); color: #fff; font-weight: 700; cursor: pointer; }
  .helper-card button:disabled { opacity: 0.7; cursor: wait; }
  #result-box { display: none; margin-top: 18px; border-radius: 12px; padding: 14px 16px; font-size: 14px; }
  #result-box.success { display: block; background: rgba(47, 143, 95, 0.1); border: 1px solid rgba(47, 143, 95, 0.28); }
  #result-box.error { display: block; background: rgba(244, 67, 54, 0.08); color: #b71c1c; border: 1px solid rgba(244, 67, 54, 0.25); }
  .account-hint { font-size: 13px; color: var(--gray-400); margin-bottom: 20px; word-break: break-all; }
</style>
<link rel="stylesheet" href="css/lumi-chat.css?v=20260609m">
</head>
<body>
<div class="helper-page">
  <div class="helper-card">
    <h1>비밀번호 재설정</h1>
    <p>새 비밀번호를 입력해 주세요. (일반 회원가입 계정)</p>
    <p id="account-hint" class="account-hint" hidden></p>
    <form id="reset-password-form">
      <label>비밀번호 (영문자를 포함해 8자 이상)<input id="password-input" type="password" placeholder="8자 이상" minlength="8" required autocomplete="new-password"></label>
      <label>비밀번호 확인<input id="password-confirm-input" type="password" placeholder="다시 입력" required autocomplete="new-password"></label>
      <button id="reset-btn" type="submit">비밀번호 변경</button>
    </form>
    <div id="result-box"></div>
  </div>
</div>
<script src="js/api-base.js"></script>
<script src="js/password-rules.js"></script>
<script>
  const API_BASE = typeof jurinApiBase === 'function' ? jurinApiBase() : 'http://localhost:5000';
  const params = new URLSearchParams(window.location.search);
  const loginId = (params.get('loginId') || '').trim();
  const email = (params.get('email') || '').trim();
  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function showResult(type, message) {
    const box = document.getElementById('result-box');
    box.className = type;
    box.innerHTML = message;
    box.style.display = 'block';
  }
  if (loginId && email) {
    const hint = document.getElementById('account-hint');
    hint.textContent = '계정: ' + loginId + ' · ' + email;
    hint.hidden = false;
  }
  if (!loginId || !email) {
    document.getElementById('reset-btn').disabled = true;
    showResult('error', '비밀번호 찾기에서 계정 확인 후 다시 진행해 주세요.');
  }
  async function resetPassword(event) {
    event.preventDefault();
    if (!loginId || !email) {
      showResult('error', '비밀번호 찾기에서 계정 확인 후 다시 진행해 주세요.');
      return;
    }
    const password = document.getElementById('password-input').value;
    const passwordConfirm = document.getElementById('password-confirm-input').value;
    const btn = document.getElementById('reset-btn');
    if (!password || !passwordConfirm) {
      showResult('error', '비밀번호를 모두 입력해 주세요.');
      return;
    }
    if (typeof jurinValidatePassword === 'function') {
      const rules = jurinValidatePassword(password);
      if (!rules.ok) {
        showResult('error', rules.message);
        return;
      }
    }
    if (password !== passwordConfirm) {
      showResult('error', '비밀번호가 일치하지 않습니다.');
      return;
    }
    btn.disabled = true;
    btn.textContent = '변경 중...';
    document.getElementById('result-box').style.display = 'none';
    try {
      const res = await fetch(API_BASE + '/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ loginId, email, password, passwordConfirm }),
      });
      const data = await res.json();
      if (data.success) {
        let seconds = 5;
        document.getElementById('reset-password-form').reset();
        const tick = () => showResult('success', '비밀번호가 변경되었습니다. ' + seconds + '초 후 메인으로 이동합니다.');
        tick();
        const timer = setInterval(() => {
          seconds -= 1;
          if (seconds <= 0) { clearInterval(timer); window.location.href = '주린닷컴홈피.html'; return; }
          tick();
        }, 1000);
      } else {
        showResult('error', escapeHtml(data.message || '변경에 실패했습니다.'));
      }
    } catch (e) {
      showResult('error', '서버에 연결할 수 없습니다.');
    } finally {
      btn.disabled = false;
      btn.textContent = '비밀번호 변경';
    }
  }
  document.getElementById('reset-password-form').addEventListener('submit', resetPassword);
</script>
<script src="js/lumi-chat.js?v=20260615"></script>
</body>
</html>

<script>
  function renderImportantSummaryHtml(raw) {
    const text = normalizeDisplayText(raw);
    if (!text) return '';
    const brushClass = ['brush-1', 'brush-2', 'brush-3', 'brush-4'];
    const keywordPattern = /(매수|보유|약세|강세|목표가|리스크|위험|변동성|상승|하락|추세|저항|지지|실적|수급|거래량|현재가|%|원)/;
    const sentenceRegex = /[^.!?\n]+(?:[.!?…]+|$)/g;
    const lines = text.split('\n').map(function (line) {
      const sentences = (line.match(sentenceRegex) || [line]).map(function (s) { return s.trim(); }).filter(Boolean);
      if (!sentences.length) return '';
      const pickCount = Math.min(3, Math.max(1, Math.round(sentences.length / 3)));
      const ranked = sentences.map(function (sentence, idx) {
        let score = 0;
        if (keywordPattern.test(sentence)) score += 3;
        if (/\d/.test(sentence)) score += 2;
        if (sentence.length >= 24 && sentence.length <= 80) score += 1;
        return { idx: idx, score: score, rand: Math.random() };
      });
      ranked.sort(function (a, b) { return (b.score - a.score) || (a.rand - b.rand); });
      const selected = new Set(ranked.slice(0, pickCount).map(function (r) { return r.idx; }));
      return sentences.map(function (sentence, idx) {
        const safe = escapeHtml(sentence);
        if (!selected.has(idx)) return safe;
        const cls = brushClass[Math.floor(Math.random() * brushClass.length)];
        return '<span class="important-line ' + cls + '">' + safe + '</span>';
      }).join(' ');
    });
    return lines.join('<br>');
  }

  function normalizeDisplayText(raw) {
    let s = String(raw || '')
      .replace(/\r\n/g, '\n')
      .replace(/^\s+/gm, '')
      .trim();
    for (let i = 0; i < 4; i += 1) {
      if (s.length >= 6 && s.startsWith('"""') && s.endsWith('"""')) {
        s = s.slice(3, -3).trim();
        continue;
      }
      if (s.length >= 6 && s.startsWith("'''") && s.endsWith("'''")) {
        s = s.slice(3, -3).trim();
        continue;
      }
      break;
    }
    s = s.replace(/^```(?:\w+)?\s*/i, '').replace(/```$/i, '').trim();
    return s.replace(/\n{3,}/g, '\n\n').trim();
  }

  function escapeHtml(text) {
    if (text == null) return '';
    const d = document.createElement('div');
    d.textContent = String(text);
    return d.innerHTML;
  }

  function renderContextTermHints(terms) {
    const list = Array.isArray(terms) ? terms : [];
    if (!list.length) return '';
    return '<div class="term-hint-row">' + list.map(function (term) {
      const q = encodeURIComponent(term);
      return '<a class="term-hint-chip" href="glossary.html?term=' + q + '">' + escapeHtml(term) + '</a>';
    }).join('') + '</div>';
  }

  function predictionParseChartTime(candle, intraday) {
    if (intraday) return new Date(Number(candle.time) * 1000);
    const t = String(candle.time || '');
    return new Date(t.length <= 10 ? t + 'T12:00:00' : t);
  }

  function predictionForecastEndpoint(lastY, targetRaw, opinion) {
    let target = Number(targetRaw);
    const cur = Number(lastY);
    if (!Number.isFinite(cur) || cur <= 0) return cur;
    if (!Number.isFinite(target) || target <= 0) target = cur;
    if (opinion === '약세') target = Math.min(target, cur * 0.985);
    else if (opinion === '강력매수') target = Math.max(target, cur * 1.04);
    else if (opinion === '매수') target = Math.max(target, cur * 1.015);
    else target = Math.min(Math.max(target, cur * 0.99), cur * 1.01);

    if (Math.abs(target - cur) < cur * 0.002) {
      if (opinion === '약세') target = cur * 0.985;
      else if (opinion === '강력매수') target = cur * 1.04;
      else if (opinion === '매수') target = cur * 1.015;
      else target = cur;
    }
    return target;
  }

  function stddev(values) {
    if (!Array.isArray(values) || values.length < 2) return 0;
    let sum = 0;
    for (let i = 0; i < values.length; i += 1) sum += values[i];
    const mean = sum / values.length;
    let varSum = 0;
    for (let j = 0; j < values.length; j += 1) {
      const d = values[j] - mean;
      varSum += d * d;
    }
    return Math.sqrt(varSum / (values.length - 1));
  }

  function percentileSorted(sortedArr, p) {
    if (!sortedArr.length) return 0;
    const pos = (sortedArr.length - 1) * p;
    const lo = Math.floor(pos);
    const hi = Math.ceil(pos);
    if (lo === hi) return sortedArr[lo];
    const w = pos - lo;
    return sortedArr[lo] * (1 - w) + sortedArr[hi] * w;
  }

  function randn() {
    let u = 0;
    let v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function opinionDriftBias(opinion) {
    if (opinion === '강력매수') return 0.0009;
    if (opinion === '매수') return 0.00045;
    if (opinion === '약세') return -0.0007;
    return 0;
  }

  function normalizeForecastDrift(rawDrift, opinion) {
    if (opinion === '강력매수') return Math.max(rawDrift, 0.00045);
    if (opinion === '매수') return Math.max(rawDrift, 0.00018);
    if (opinion === '약세') return Math.min(rawDrift, -0.00018);
    return Math.max(-0.00008, Math.min(0.00008, rawDrift));
  }

  function buildForecastScenario(closes, lastY, targetY, steps, opinion, newsSentimentScore) {
    const rets = [];
    for (let i = 1; i < closes.length; i += 1) {
      const prev = Number(closes[i - 1]);
      const cur = Number(closes[i]);
      if (Number.isFinite(prev) && Number.isFinite(cur) && prev > 0 && cur > 0) {
        rets.push(Math.log(cur / prev));
      }
    }

    const histVol = Math.max(0.0015, stddev(rets.slice(-60)));
    const targetDrift = Math.log(Math.max(targetY, 1) / Math.max(lastY, 1)) / Math.max(steps, 1);
    const sentiment = Number.isFinite(Number(newsSentimentScore)) ? Number(newsSentimentScore) : 0;
    const rawDrift = targetDrift * 0.82 + opinionDriftBias(opinion) + sentiment * 0.00025;
    const drift = normalizeForecastDrift(rawDrift, opinion);
    const sigma = histVol * (0.9 + Math.min(0.25, Math.abs(sentiment) * 0.2));

    const pathCount = 180;
    const paths = [];
    const finalPrices = [];
    for (let p = 0; p < pathCount; p += 1) {
      const one = [lastY];
      let price = lastY;
      for (let s = 1; s <= steps; s += 1) {
        const shock = sigma * randn();
        const growth = drift + shock;
        price = Math.max(1, price * Math.exp(growth));
        one.push(price);
      }
      paths.push(one);
      finalPrices.push(price);
    }

    const median = [lastY];
    const lower = [lastY];
    const upper = [lastY];
    for (let s = 1; s <= steps; s += 1) {
      const bucket = [];
      for (let p = 0; p < pathCount; p += 1) bucket.push(paths[p][s]);
      bucket.sort(function (a, b) { return a - b; });
      lower.push(percentileSorted(bucket, 0.2));
      median.push(percentileSorted(bucket, 0.5));
      upper.push(percentileSorted(bucket, 0.8));
    }

    let upCount = 0;
    for (let i = 0; i < finalPrices.length; i += 1) {
      if (finalPrices[i] >= lastY) upCount += 1;
    }
    const upProb = Math.round((upCount / Math.max(1, finalPrices.length)) * 100);

    return { lower: lower, median: median, upper: upper, upProb: upProb };
  }

  function kstDateFromUtcDate(d) {
    return new Date(d.getTime() + 9 * 60 * 60 * 1000);
  }

  function utcDateFromKstDate(d) {
    return new Date(d.getTime() - 9 * 60 * 60 * 1000);
  }

  function isKoreanChartCode(code) {
    return /^\d{6}$/.test(String(code || ''));
  }

  function moveKstToNextBusinessOpen(kstDate) {
    const d = new Date(kstDate.getTime());
    d.setUTCDate(d.getUTCDate() + 1);
    d.setUTCHours(9, 0, 0, 0);
    while (d.getUTCDay() === 0 || d.getUTCDay() === 6) {
      d.setUTCDate(d.getUTCDate() + 1);
      d.setUTCHours(9, 0, 0, 0);
    }
    return d;
  }

  function buildForecastTimes(lastX, steps, intraday, code) {
    if (!intraday) {
      const fxs = [lastX];
      for (let i = 1; i <= steps; i += 1) {
        const d = new Date(lastX.getTime());
        d.setDate(d.getDate() + i);
        fxs.push(d);
      }
      return fxs;
    }

    const useKrSession = isKoreanChartCode(code);
    const out = [lastX];

    if (!useKrSession) {
      const sec = Math.floor(lastX.getTime() / 1000);
      for (let i = 1; i <= steps; i += 1) {
        out.push(new Date((sec + i * 300) * 1000));
      }
      return out;
    }

    let kst = kstDateFromUtcDate(lastX);
    const hh = kst.getUTCHours();
    const mm = kst.getUTCMinutes();
    if (hh > 15 || (hh === 15 && mm >= 30)) {
      kst = moveKstToNextBusinessOpen(kst);
    } else {
      kst = new Date(kst.getTime() + 5 * 60 * 1000);
      if (kst.getUTCHours() < 9) kst.setUTCHours(9, 0, 0, 0);
      if (kst.getUTCHours() > 15 || (kst.getUTCHours() === 15 && kst.getUTCMinutes() > 30)) {
        kst = moveKstToNextBusinessOpen(kst);
      }
      if (kst.getUTCDay() === 0 || kst.getUTCDay() === 6) {
        kst = moveKstToNextBusinessOpen(kst);
      }
    }

    for (let i = 1; i <= steps; i += 1) {
      out.push(utcDateFromKstDate(kst));
      kst = new Date(kst.getTime() + 5 * 60 * 1000);
      if (kst.getUTCHours() > 15 || (kst.getUTCHours() === 15 && kst.getUTCMinutes() > 30)) {
        kst = moveKstToNextBusinessOpen(kst);
      }
      if (kst.getUTCDay() === 0 || kst.getUTCDay() === 6) {
        kst = moveKstToNextBusinessOpen(kst);
      }
    }
    return out;
  }

  async function renderPredictionPlot(analysisPayload) {
    const el = document.getElementById('predictionChart');
    if (!el) return;
    if (typeof Plotly === 'undefined') {
      return;
    }

    const code = (analysisPayload && analysisPayload.chart_code) ? String(analysisPayload.chart_code).trim() : '';
    if (!code) {
      return;
    }

    const apiBase = window.JURIN_API_BASE || 'http://localhost:5000';

    try {
      const res = await fetch(`${apiBase}/api/chart-data/${encodeURIComponent(code)}?range=1d`);
      const ch = await res.json().catch(function () { return {}; });
      if (!res.ok || !ch.success || !Array.isArray(ch.candles) || ch.candles.length === 0) {
        return;
      }

      const intraday = Boolean(ch.intraday);
      const candles = ch.candles;
      const xs = candles.map(function (c) { return predictionParseChartTime(c, intraday); });
      const opens = candles.map(function (c) { return Number(c.open); });
      const highs = candles.map(function (c) { return Number(c.high); });
      const lows = candles.map(function (c) { return Number(c.low); });
      const closes = candles.map(function (c) { return Number(c.close); });

      const lastX = xs[xs.length - 1];
      const lastY = closes[closes.length - 1];
      const targetY = predictionForecastEndpoint(
        lastY,
        analysisPayload.target_price,
        analysisPayload.opinion
      );

      const steps = 28;
      const fxs = buildForecastTimes(lastX, steps, intraday, code);
      const forecast = buildForecastScenario(
        closes,
        lastY,
        targetY,
        steps,
        analysisPayload.opinion,
        analysisPayload.news_sentiment_score
      );

      const traces = [
        {
          type: 'candlestick',
          x: xs,
          open: opens,
          high: highs,
          low: lows,
          close: closes,
          name: '실제 캔들',
          increasing: {
            line: { color: '#ef5350', width: 1 },
            fillcolor: 'rgba(239, 83, 80, 0.35)',
          },
          decreasing: {
            line: { color: '#42a5f5', width: 1 },
            fillcolor: 'rgba(66, 165, 245, 0.35)',
          },
        },
        {
          x: xs,
          y: closes,
          mode: 'lines',
          name: '현재 추이',
          line: {
            color: 'rgba(46, 204, 113, 0.88)',
            width: 1.8,
            shape: 'spline',
            smoothing: 0.7,
          },
        },
        {
          x: fxs,
          y: forecast.upper,
          mode: 'lines',
          name: '예측 상단(80%)',
          line: { color: 'rgba(164, 126, 240, 0.65)', width: 1.5, shape: 'spline', smoothing: 1.05 },
          hoverinfo: 'skip',
        },
        {
          x: fxs,
          y: forecast.lower,
          mode: 'lines',
          name: '예측 하단(20%)',
          line: { color: 'rgba(164, 126, 240, 0.65)', width: 1.5, shape: 'spline', smoothing: 1.05 },
          fill: 'tonexty',
          fillcolor: 'rgba(164, 126, 240, 0.22)',
          hoverinfo: 'skip',
        },
        {
          x: fxs,
          y: forecast.median,
          mode: 'lines',
          name: '예측 중앙경로',
          line: {
            color: 'rgba(196, 167, 255, 0.92)',
            width: 2.6,
            shape: 'spline',
            smoothing: 1.15,
          },
        },
      ];

      const xaxisConfig = {
        type: 'date',
        gridcolor: 'rgba(47,143,95,0.12)',
        zeroline: false,
        showspikes: true,
        spikecolor: 'rgba(47, 143, 95, 0.35)',
        rangeslider: { visible: false },
      };
      if (intraday && isKoreanChartCode(code)) {
        xaxisConfig.rangebreaks = [
          { pattern: 'hour', bounds: [15.51, 9] },
          { pattern: 'day of week', bounds: ['sat', 'mon'] },
        ];
      }

      const layout = {
        paper_bgcolor: 'transparent',
        plot_bgcolor: '#f6faf7',
        font: { color: '#355845', size: 12, family: 'Noto Sans KR, sans-serif' },
        margin: { t: 34, r: 56, b: 44, l: 10 },
        dragmode: 'pan',
        xaxis: xaxisConfig,
        yaxis: {
          gridcolor: 'rgba(47,143,95,0.12)',
          zeroline: false,
          tickformat: ',.0f',
          side: 'right',
          fixedrange: false,
        },
        legend: {
          orientation: 'h',
          y: 1.1,
          x: 0,
          bgcolor: 'rgba(0,0,0,0)',
          font: { color: '#1f2f26', size: 12 },
        },
        showlegend: true,
      };

      await Plotly.newPlot(el, traces, layout, { responsive: true, displayModeBar: false, scrollZoom: true });
    } catch (err) {
      console.error(err);
    }
  }

  async function predictChart() {
    const stockInput = document.getElementById('stockInput').value.trim();
    if (!stockInput) {
      alert('종목명을 입력해주세요.');
      return;
    }

    const chartArea = document.getElementById('chartArea');
    chartArea.className = '';
    chartArea.innerHTML =
      '<div class="chart-loading">분석·차트 데이터를 불러오는 중…</div>';

    try {
      const apiBase = window.JURIN_API_BASE || 'http://localhost:5000';
      const response = await fetch(`${apiBase}/api/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stock_name: stockInput }),
      });

      if (!response.ok) {
        throw new Error(response.statusText || 'API 오류');
      }

      const data = await response.json();

      if (!data.success) {
        chartArea.innerHTML =
          '<div class="chart-placeholder" style="flex-direction:column;gap:12px;"><span>안내</span><span class="chart-error">' +
          escapeHtml(data.message || '분석에 실패했습니다.') +
          '</span></div>';
        return;
      }

      const opinionColor = {
        강력매수: '#00D084',
        매수: '#4F9EFF',
        보유: '#FFB800',
        약세: '#FF6B6B',
      };
      const color = opinionColor[data.opinion] || '#4F9EFF';
      const repNews = data.representative_news || null;
      const newsTone = Number(data.news_sentiment_score || 0);
      const newsToneLabel = newsTone > 0.05 ? '긍정' : (newsTone < -0.05 ? '부정' : '중립');
      const newsRationale = normalizeDisplayText(data.news_sentiment_rationale || '');
      const summaryText = normalizeDisplayText(data.summary || '');
      const summaryHtml = renderImportantSummaryHtml(summaryText);
      const rationaleHtml = renderImportantSummaryHtml(newsRationale);

      chartArea.innerHTML =
        '<div class="prediction-result-wrap">' +
        '<h3 class="prediction-result-title">' +
        escapeHtml(data.stock_name) +
        ' · 차트 예측</h3>' +
        '<div class="prediction-metric-grid">' +
        '<div class="prediction-metric-card price">' +
        '<div class="prediction-metric-label">현재가</div>' +
        '<div class="prediction-metric-value">' +
        Number(data.current_price).toLocaleString() +
        '원</div>' +
        '<div class="prediction-metric-sub" style="color:' +
        (data.change_rate >= 0 ? '#00D084' : '#FF6B6B') +
        ';font-weight:700;">' +
        (data.change_rate >= 0 ? '▲' : '▼') +
        ' ' +
        Math.abs(Number(data.change_rate)).toFixed(2) +
        '%</div></div>' +
        '<div class="prediction-metric-card opinion" style="background:rgba(79,158,255,0.08);border-color:' +
        color +
        ';">' +
        '<div class="prediction-metric-label">AI 투자의견 · 목표가</div>' +
        '<div class="prediction-metric-value" style="font-size:20px;color:' +
        color +
        ';">' +
        escapeHtml(data.opinion) +
        '</div>' +
        '<div class="prediction-metric-sub">목표가 ' +
        Number(data.target_price).toLocaleString() +
        '원</div></div></div>' +
        '<div class="prediction-chart-wrap">' +
        '<div class="prediction-chart-title">예상그래프</div>' +
        '<div id="predictionChart"></div>' +
        '</div>' +
        (repNews ? (
          '<div class="prediction-news-box">' +
          '<div class="prediction-news-meta">대표 뉴스 반영 (' + newsToneLabel + ' · 점수 ' + Number(newsTone).toFixed(2) + ')</div>' +
          '<div class="prediction-news-title">' + escapeHtml(repNews.title || '') + '</div>' +
          '<div class="prediction-news-rationale">' + rationaleHtml + '</div>' +
          '</div>'
        ) : '') +
        '<div class="prediction-summary">' +
        summaryHtml +
        '</div>' +
        renderContextTermHints(['지지선', '저항선', '이동평균선', '변동성', '레버리지', '인버스']) +
        '</div>';

      setTimeout(function () {
        renderPredictionPlot(data);
      }, 0);
    } catch (error) {
      console.error(error);
      chartArea.innerHTML =
        '<div class="chart-placeholder" style="flex-direction:column;gap:12px;"><span>❌</span><span class="chart-error">' +
        escapeHtml(error.message || '백엔드 서버 연결을 확인해 주세요.') +
        '</span></div>';
    }
  }

  document.getElementById('stockInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') predictChart();
  });

  if (window.JurinStockAutocomplete) {
    var _chartStockIn = document.getElementById('stockInput');
    if (_chartStockIn) JurinStockAutocomplete.attachStock(_chartStockIn, {});
  }
</script>

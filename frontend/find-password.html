<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 찾기 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260428">
<style>
  .helper-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(circle at top right, rgba(47, 143, 95, 0.12), transparent 32%),
      radial-gradient(circle at bottom left, rgba(47, 143, 95, 0.08), transparent 38%),
      #ffffff;
  }
  .helper-card {
    width: min(100%, 500px);
    padding: 36px;
    border-radius: 24px;
    border: 1px solid rgba(47, 143, 95, 0.18);
    background: #ffffff;
    box-shadow: 0 20px 60px rgba(31, 47, 38, 0.1);
  }
  .helper-card h1 { font-size: 30px; margin-bottom: 10px; color: var(--text-primary); }
  .helper-card p {
    color: var(--gray-400);
    line-height: 1.7;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .helper-card label {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
  }
  .helper-card input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(47, 143, 95, 0.22);
    background: var(--gray-100);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
  }
  .helper-card button {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    color: #ffffff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  .helper-card button:disabled { opacity: 0.7; cursor: wait; }
  #result-box {
    display: none;
    margin-top: 18px;
    border-radius: 12px;
    padding: 14px 16px;
    line-height: 1.6;
    font-size: 14px;
  }
  #result-box.success {
    display: block;
    background: rgba(47, 143, 95, 0.1);
    color: var(--text-primary);
    border: 1px solid rgba(47, 143, 95, 0.28);
  }
  #result-box.error {
    display: block;
    background: rgba(244, 67, 54, 0.08);
    color: #b71c1c;
    border: 1px solid rgba(244, 67, 54, 0.25);
  }
</style>
</head>
<body>
<div class="helper-page">
  <div class="helper-card">
    <h1>비밀번호 찾기</h1>
    <p>아이디와 가입 이메일을 입력하면 비밀번호 재설정 화면으로 이동할 수 있습니다.</p>
    <form id="find-password-form">
      <label>
        아이디
        <input id="login-id-input" type="text" placeholder="아이디를 입력하세요" required>
      </label>
      <label>
        가입 이메일
        <input id="email-input" type="email" placeholder="example@email.com" required>
      </label>
      <button id="find-btn" type="submit">비밀번호 재설정 요청</button>
    </form>
    <div id="result-box"></div>
  </div>
</div>
<script>
  const API_BASE = 'http://localhost:5000';

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c]));
  }

  function showResult(type, message) {
    const resultBox = document.getElementById('result-box');
    resultBox.className = type;
    resultBox.innerHTML = message;
    resultBox.style.display = 'block';
  }

  async function findPassword(event) {
    event.preventDefault();

    const loginId = document.getElementById('login-id-input').value.trim();
    const email = document.getElementById('email-input').value.trim();
    const btn = document.getElementById('find-btn');
    const resultBox = document.getElementById('result-box');

    if (!loginId || !email) {
      showResult('error', '아이디와 이메일을 모두 입력해주세요.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '확인 중...';
    resultBox.style.display = 'none';

    try {
      const res = await fetch(`${API_BASE}/api/auth/find-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ loginId, email })
      });

      const data = await res.json();
      if (data.success) {
        showResult('success', '일치하는 계정을 확인했습니다. 비밀번호 재설정 화면으로 이동합니다.');
        const params = new URLSearchParams({ loginId: data.loginId, email: data.email });
        setTimeout(() => {
          window.location.href = `reset-password.html?${params.toString()}`;
        }, 400);
      } else {
        showResult('error', escapeHtml(data.message || '입력한 정보를 다시 확인해주세요.'));
      }
    } catch (err) {
      showResult('error', '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
    } finally {
      btn.disabled = false;
      btn.textContent = '비밀번호 재설정 요청';
    }
  }

  document.getElementById('find-password-form').addEventListener('submit', findPassword);
</script>
</body>
</html>

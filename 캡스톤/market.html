<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장 정보 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .market-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .market-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--navy));
    padding: 40px 0;
    border-bottom: 1px solid rgba(79, 158, 255, 0.15);
  }

  .market-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .market-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .market-sub {
    font-size: 16px;
    color: var(--gray-400);
  }

  .market-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .indices-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .indices-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .indices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .index-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(79, 158, 255, 0.1);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  .index-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 12px;
  }

  .index-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .index-change {
    font-size: 16px;
    font-weight: 600;
  }

  .index-change.up {
    color: var(--up);
  }

  .index-change.down {
    color: var(--down);
  }

  .stocks-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
  }

  .stocks-filter {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    padding: 8px 16px;
    background: rgba(79, 158, 255, 0.1);
    border: 1px solid rgba(79, 158, 255, 0.2);
    border-radius: 20px;
    color: var(--gray-200);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-btn:hover {
    background: rgba(79, 158, 255, 0.2);
    border-color: rgba(79, 158, 255, 0.4);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 16px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(79, 158, 255, 0.1);
  }

  .stocks-table th {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stocks-table td {
    font-size: 15px;
    color: var(--white);
  }

  .stock-name {
    font-weight: 600;
    color: var(--white);
  }

  .stock-price {
    font-weight: 700;
    color: var(--accent);
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--up);
  }

  .stock-change.flat {
    color: var(--gray-400);
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #4fc97a;
    margin-left: 12px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #4fc97a;
    animation: live-pulse 1.4s infinite;
  }

  .live-dot.error {
    background: #ff5c5c;
    animation: none;
  }

  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }

  @keyframes flash-up {
    0%   { background: rgba(79, 201, 122, 0.25); }
    100% { background: transparent; }
  }

  @keyframes flash-down {
    0%   { background: rgba(255, 92, 92, 0.25); }
    100% { background: transparent; }
  }

  .flash-up   { animation: flash-up   0.7s ease-out; }
  .flash-down { animation: flash-down 0.7s ease-out; }

  .stock-volume {
    color: var(--gray-200);
  }

  .stocks-pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .page-btn {
    min-width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid rgba(79, 158, 255, 0.25);
    background: rgba(79, 158, 255, 0.08);
    color: var(--gray-200);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .page-btn:hover {
    border-color: rgba(79, 158, 255, 0.45);
    background: rgba(79, 158, 255, 0.18);
  }

  .page-btn.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .page-ellipsis {
    color: var(--gray-500);
    font-size: 13px;
    padding: 0 2px;
    user-select: none;
  }

  .market-news {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    scroll-margin-top: 90px;
  }

  .news-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .news-list {
    display: grid;
    gap: 16px;
  }

  .news-item {
    display: flex;
    gap: 16px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border: 1px solid rgba(79, 158, 255, 0.08);
    cursor: pointer;
    transition: all 0.2s;
  }

  .news-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .news-image {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    flex-shrink: 0;
  }

  .news-content {
    flex: 1;
  }

  .news-category {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .news-headline {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .news-summary {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.5;
  }

  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .news-time {
    font-size: 12px;
    color: var(--gray-500);
  }

  .news-source {
    font-size: 12px;
    color: var(--gray-500);
    background: rgba(79, 158, 255, 0.1);
    padding: 4px 8px;
    border-radius: 12px;
  }

  .btn-back {
    background: rgba(79, 158, 255, 0.2);
    border: 1px solid rgba(79, 158, 255, 0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .btn-back:hover {
    background: rgba(79, 158, 255, 0.3);
    border-color: rgba(79, 158, 255, 0.6);
  }

  @media (max-width: 768px) {
    .stocks-table {
      font-size: 14px;
    }

    .stocks-table th,
    .stocks-table td {
      padding: 12px 8px;
    }

    .news-item {
      flex-direction: column;
      gap: 12px;
    }

    .news-image {
      width: 100%;
      height: 60px;
    }
  }
</style>
</head>

  <ul class="nav-menu">
    <li><a href="analysis.html">AI 분석</a></li>

  <div class="nav-right">

<div class="market-container">
  <div class="market-header">
    <div class="market-header-content">
      <a href="주린닷컴홈피.html" class="btn-back">← 돌아가기</a>
      <div class="market-title">📊 시장 정보</div>
      <div class="market-sub">실시간 시장 지표와 주요 종목을 확인하세요</div>
    </div>
  </div>

  <div class="market-content">
    <div class="indices-section">
      <div class="indices-title">주요 지수</div>
      <div class="indices-grid" id="indicesGrid">
        <!-- 동적으로 지수 카드 생성 -->
      </div>
    </div>

    <div class="stocks-section">
      <div class="stocks-header">
        <div class="stocks-title">
          주요 종목
          <span class="live-badge">
            <span class="live-dot" id="liveDot"></span>
            <span id="liveStatus">연결 중...</span>
          </span>
        </div>
        <div class="stocks-filter">
          <button class="filter-btn active" onclick="filterStocks('all', event)">전체</button>
          <button class="filter-btn" onclick="filterStocks('up', event)">상승</button>
          <button class="filter-btn" onclick="filterStocks('down', event)">하락</button>
        </div>
      </div>
      <table class="stocks-table" id="stocksTable">
        <thead>
          <tr>
            <th>종목명</th>
            <th>현재가</th>
            <th>전일대비</th>
            <th>등락률</th>
            <th>거래량</th>
          </tr>
        </thead>
        <tbody id="stocksTableBody">
          <tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:32px">시세 불러오는 중...</td></tr>
        </tbody>
      </table>
      <div class="stocks-pagination" id="stocksPagination"></div>
    </div>
  </div>
</div>

<script>
  const BACKEND = 'http://localhost:5000';
  const POLL_INTERVAL = 5000; // 백엔드 캐시 응답을 사용해 5초마다 갱신
  const PAGE_SIZE = 10;

  // 시장 지수 데이터 (정적)
  const indicesData = [
    { name: 'KOSPI',    value: 2584.31, change:  0.63 },
    { name: 'KOSDAQ',   value:  745.18, change: -0.21 },
    { name: 'KOSPI 200',value:  345.67, change:  0.45 },
    { name: 'KRX 100',  value: 5678.90, change: -0.12 },
  ];

  // 현재 필터 + 이전 가격 캐시
  let currentFilter = 'all';
  let currentPage = 1;
  let totalPagesFromApi = 1;
  let prevPrices = {};  // code -> price
  let latestByCode = {}; // code -> 마지막 정상 데이터
  let stockNameByCode = {}; // code -> name
  let stockOrder = [];      // API가 내려준 순서 유지
  let liveStocks = [];

  document.addEventListener('DOMContentLoaded', () => {
    renderIndices();
    fetchLivePrices();               // 즉시 1회
    setInterval(fetchLivePrices, POLL_INTERVAL);
  });

  // ── 실시간 시세 폴링 ─────────────────────────────────
  async function fetchLivePrices() {
    const dot    = document.getElementById('liveDot');
    const status = document.getElementById('liveStatus');
    try {
      const res  = await fetch(`${BACKEND}/api/live-prices?page=${currentPage}&page_size=${PAGE_SIZE}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      const incoming = Array.isArray(data.stocks) ? data.stocks : [];
      if (incoming.length > 0) {
        stockOrder = incoming.map(s => s.code).filter(Boolean);
      }

      totalPagesFromApi = Math.max(1, Number(data.total_pages || 1));
      currentPage = Math.min(currentPage, totalPagesFromApi);

      // 실패 응답이 와도 화면에서 종목이 사라지지 않게 마지막 정상값을 유지
      incoming.forEach(stock => {
        if (!stock || !stock.code) return;
        stockNameByCode[stock.code] = stock.name || stockNameByCode[stock.code] || stock.code;
        if (!stock.error) {
          latestByCode[stock.code] = { ...stock, stale: false, error: null };
        } else if (latestByCode[stock.code]) {
          latestByCode[stock.code] = {
            ...latestByCode[stock.code],
            stale: true,
            error: stock.error,
          };
        }
      });

      const incomingByCode = Object.fromEntries(incoming.map(s => [s.code, s]));
      liveStocks = stockOrder.map(code => {
        const cached = latestByCode[code];
        if (cached) return { ...cached, name: stockNameByCode[code] || cached.name || code };

        const raw = incomingByCode[code] || {};
        if (raw.error) {
          return {
            code,
            name: stockNameByCode[code] || code,
            error: raw.error,
            stale: true,
            loading: false,
          };
        }
        return { code, name: stockNameByCode[code] || code, loading: true };
      });

      dot.classList.remove('error');
      status.textContent = `${data.ts} 업데이트 (${data.total_count || data.count || liveStocks.length}종목)`;
      renderStocks();
    } catch (e) {
      dot.classList.add('error');
      status.textContent = '연결 실패';
      console.warn('[live-prices]', e.message);
    }
  }

  // ── 종목 테이블 렌더링 ───────────────────────────────
  function renderStocks() {
    const tbody = document.getElementById('stocksTableBody');
    const pagination = document.getElementById('stocksPagination');

    let filtered = liveStocks.filter(s => !s.loading);
    if (currentFilter === 'up')   filtered = filtered.filter(s => s.direction === 'up');
    if (currentFilter === 'down') filtered = filtered.filter(s => s.direction === 'down');

    const totalPages = Math.max(1, totalPagesFromApi);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:32px">
        ${currentFilter !== 'all' ? '해당 조건의 종목이 없습니다.' : '시세 불러오는 중...'}
      </td></tr>`;
      pagination.innerHTML = '';
      return;
    }

    const pageStocks = filtered;

    // 페이지 단위(10개)로 한 번에 렌더링한다.
    const rowsHtml = pageStocks.map(stock => {
      if (stock.loading) {
        return `
          <tr id="row-${stock.code}">
            <td>
              <div class="stock-name">${stock.name}</div>
              <div style="font-size:12px;color:var(--gray-500)">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">시세 불러오는 중...</td>
          </tr>`;
      }

      if (stock.error && (stock.price === undefined || stock.price === null)) {
        return `
          <tr id="row-${stock.code}">
            <td>
              <div class="stock-name">${stock.name}</div>
              <div style="font-size:12px;color:var(--gray-500)">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">조회 지연 (${stock.error})</td>
          </tr>`;
      }

      const dir = stock.direction;
      const changeSign = dir === 'up' ? '+' : (dir === 'down' ? '' : '±');
      const changeClass = dir === 'up' ? 'up' : (dir === 'down' ? 'down' : 'flat');
      const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '-');

      const hadPrev = Object.prototype.hasOwnProperty.call(prevPrices, stock.code);
      const priceChanged = hadPrev && prevPrices[stock.code] !== stock.price;
      const flashClass = priceChanged ? (dir === 'up' ? 'flash-up' : dir === 'down' ? 'flash-down' : '') : '';

      return `
        <tr id="row-${stock.code}" class="${flashClass}">
          <td>
            <div class="stock-name">${stock.name}</div>
            <div style="font-size:12px;color:var(--gray-500)">${stock.code}</div>
          </td>
          <td class="stock-price">${formatCurrency(stock.price)}</td>
          <td class="stock-change ${changeClass}">${arrow} ${formatCurrency(Math.abs(stock.change))}</td>
          <td class="stock-change ${changeClass}">${changeSign}${stock.rate.toFixed(2)}%</td>
          <td class="stock-volume">${formatNumber(stock.volume)}${stock.stale ? ' (지연)' : ''}</td>
        </tr>`;
    }).join('');

    tbody.innerHTML = rowsHtml;
    renderPagination(totalPages);

    // 다음 비교를 위해 렌더링 완료 후 가격 캐시 업데이트
    filtered.forEach(stock => {
      prevPrices[stock.code] = stock.price;
    });
  }

  function renderPagination(totalPages) {
    const pagination = document.getElementById('stocksPagination');
    if (totalPages <= 1) {
      pagination.innerHTML = '';
      return;
    }

    const maxVisiblePages = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
    let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

    // 끝쪽에 걸리면 시작 페이지를 다시 당겨서 버튼 개수를 맞춘다.
    startPage = Math.max(1, endPage - maxVisiblePages + 1);

    let html = '';
    html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">이전</button>`;

    if (startPage > 1) {
      html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
      if (startPage > 2) {
        html += `<span class="page-ellipsis">...</span>`;
      }
    }

    for (let page = startPage; page <= endPage; page += 1) {
      html += `<button class="page-btn ${page === currentPage ? 'active' : ''}" onclick="goToPage(${page})">${page}</button>`;
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) {
        html += `<span class="page-ellipsis">...</span>`;
      }
      html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
    }

    html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">다음</button>`;
    pagination.innerHTML = html;
  }

  function goToPage(page) {
    currentPage = Math.max(1, Number(page) || 1);
    fetchLivePrices();
  }

  // ── 지수 렌더링 ─────────────────────────────────────
  function renderIndices() {
    document.getElementById('indicesGrid').innerHTML = indicesData.map(idx => `
      <div class="index-card">
        <div class="index-name">${idx.name}</div>
        <div class="index-value">${idx.value.toLocaleString()}</div>
        <div class="index-change ${idx.change >= 0 ? 'up' : 'down'}">
          ${idx.change >= 0 ? '▲' : '▼'} ${Math.abs(idx.change)}%
        </div>
      </div>`).join('');
  }

  // ── 필터 버튼 ────────────────────────────────────────
  function filterStocks(filter, event) {
    currentFilter = filter;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (event && event.target) event.target.classList.add('active');
    renderStocks();
  }

  // ── 포맷 유틸 ────────────────────────────────────────
  function formatCurrency(v) { return '₩' + Number(v).toLocaleString(); }

  function formatNumber(n) {
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
    if (n >= 10000)     return (n / 10000).toFixed(1) + '만';
    return Number(n).toLocaleString();
  }
</script>
<script src="js/common-auth.js"></script>

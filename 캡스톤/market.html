<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장 정보 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .market-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .market-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--navy));
    padding: 40px 0;
    border-bottom: 1px solid rgba(79, 158, 255, 0.15);
  }

  .market-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .market-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .market-sub {
    font-size: 16px;
    color: var(--gray-400);
  }

  .market-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .indices-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .indices-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .indices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .index-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(79, 158, 255, 0.1);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  .index-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 12px;
  }

  .index-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .index-change {
    font-size: 16px;
    font-weight: 600;
  }

  .index-change.up {
    color: var(--up);
  }

  .index-change.down {
    color: var(--down);
  }

  .stocks-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
  }

  .stocks-filter {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    padding: 8px 16px;
    background: rgba(79, 158, 255, 0.1);
    border: 1px solid rgba(79, 158, 255, 0.2);
    border-radius: 20px;
    color: var(--gray-200);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-btn:hover {
    background: rgba(79, 158, 255, 0.2);
    border-color: rgba(79, 158, 255, 0.4);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 16px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(79, 158, 255, 0.1);
  }

  .stocks-table th {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stocks-table td {
    font-size: 15px;
    color: var(--white);
  }

  .stock-name {
    font-weight: 600;
    color: var(--white);
  }

  .stock-price {
    font-weight: 700;
    color: var(--accent);
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--up);
  }

  .stock-change.down {
    color: var(--down);
  }

  .stock-volume {
    color: var(--gray-200);
  }

  .market-news {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    scroll-margin-top: 90px;
  }

  .news-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .news-list {
    display: grid;
    gap: 16px;
  }

  .news-item {
    display: flex;
    gap: 16px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border: 1px solid rgba(79, 158, 255, 0.08);
    cursor: pointer;
    transition: all 0.2s;
  }

  .news-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .news-image {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    flex-shrink: 0;
  }

  .news-content {
    flex: 1;
  }

  .news-category {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .news-headline {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .news-summary {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.5;
  }

  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .news-time {
    font-size: 12px;
    color: var(--gray-500);
  }

  .news-source {
    font-size: 12px;
    color: var(--gray-500);
    background: rgba(79, 158, 255, 0.1);
    padding: 4px 8px;
    border-radius: 12px;
  }

  .btn-back {
    background: rgba(79, 158, 255, 0.2);
    border: 1px solid rgba(79, 158, 255, 0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .btn-back:hover {
    background: rgba(79, 158, 255, 0.3);
    border-color: rgba(79, 158, 255, 0.6);
  }

  @media (max-width: 768px) {
    .stocks-table {
      font-size: 14px;
    }

    .stocks-table th,
    .stocks-table td {
      padding: 12px 8px;
    }

    .news-item {
      flex-direction: column;
      gap: 12px;
    }

    .news-image {
      width: 100%;
      height: 60px;
    }
  }
</style>
</head>

    <button class="btn-primary">무료 시작하기</button>
  </div>
</nav>

<div class="market-container">
  <div class="market-header">
    <div class="market-header-content">
      <a href="주린닷컴홈피.html" class="btn-back">← 돌아가기</a>
      <div class="market-title">📊 시장 정보</div>
      <div class="market-sub">실시간 시장 지표와 주요 종목을 확인하세요</div>
    </div>
  </div>

  <div class="market-content">
    <div class="indices-section">
      <div class="indices-title">주요 지수</div>
      <div class="indices-grid" id="indicesGrid">
        <!-- 동적으로 지수 카드 생성 -->
      </div>
    </div>

    <div class="stocks-section">
      <div class="stocks-header">
        <div class="stocks-title">주요 종목</div>
        <div class="stocks-filter">
          <button class="filter-btn active" onclick="filterStocks('all')">전체</button>
          <button class="filter-btn" onclick="filterStocks('up')">상승</button>
          <button class="filter-btn" onclick="filterStocks('down')">하락</button>
          <button class="filter-btn" onclick="filterStocks('volume')">거래량</button>
        </div>
      </div>
      <table class="stocks-table" id="stocksTable">
        <thead>
          <tr>
            <th>종목명</th>
            <th>현재가</th>
            <th>전일대비</th>
            <th>거래량</th>
            <th>시가총액</th>
          </tr>
        </thead>
        <tbody id="stocksTableBody">
          <!-- 동적으로 주식 데이터 생성 -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // 시장 지수 데이터
  const indicesData = [
    { name: 'KOSPI', value: 2584.31, change: 0.63 },
    { name: 'KOSDAQ', value: 745.18, change: -0.21 },
    { name: 'KOSPI 200', value: 345.67, change: 0.45 },
    { name: 'KRX 100', value: 5678.90, change: -0.12 }
  ];

  // 주식 데이터
  const stocksData = [
    { name: '삼성전자', symbol: '005930', price: 75200, change: 1.24, volume: 12345678, marketCap: 449000000000000 },
    { name: 'SK하이닉스', symbol: '000660', price: 182500, change: 2.87, volume: 3456789, marketCap: 133000000000000 },
    { name: 'NAVER', symbol: '035420', price: 201000, change: -0.49, volume: 2345678, marketCap: 33000000000000 },
    { name: '카카오', symbol: '035720', price: 43150, change: 0.82, volume: 4567890, marketCap: 19200000000000 },
    { name: '현대차', symbol: '005380', price: 238000, change: -1.05, volume: 1234567, marketCap: 52000000000000 },
    { name: 'LG화학', symbol: '051910', price: 345000, change: 3.15, volume: 987654, marketCap: 23000000000000 },
    { name: 'POSCO', symbol: '005490', price: 289000, change: -1.87, volume: 765432, marketCap: 28000000000000 },
    { name: 'KB금융', symbol: '105560', price: 48500, change: 0.31, volume: 2345678, marketCap: 15800000000000 },
    { name: '신한지주', symbol: '055550', price: 35600, change: -0.28, volume: 3456789, marketCap: 18900000000000 },
    { name: '삼성바이오로직스', symbol: '207940', price: 789000, change: 4.23, volume: 123456, marketCap: 56000000000000 }
  ];

  let currentFilter = 'all';

  // 페이지 로드 시 초기화
  document.addEventListener('DOMContentLoaded', function() {
    renderIndices();
    renderStocks();
  });

  // 지수 렌더링
  function renderIndices() {
    const indicesGrid = document.getElementById('indicesGrid');

    const indicesHtml = indicesData.map(index => `
      <div class="index-card">
        <div class="index-name">${index.name}</div>
        <div class="index-value">${index.value.toLocaleString()}</div>
        <div class="index-change ${index.change >= 0 ? 'up' : 'down'}">
          ${index.change >= 0 ? '▲' : '▼'} ${Math.abs(index.change)}%
        </div>
      </div>
    `).join('');

    indicesGrid.innerHTML = indicesHtml;
  }

  // 주식 렌더링
  function renderStocks() {
    const stocksTableBody = document.getElementById('stocksTableBody');

    let filteredStocks = stocksData;

    switch (currentFilter) {
      case 'up':
        filteredStocks = stocksData.filter(stock => stock.change > 0);
        break;
      case 'down':
        filteredStocks = stocksData.filter(stock => stock.change < 0);
        break;
      case 'volume':
        filteredStocks = [...stocksData].sort((a, b) => b.volume - a.volume);
        break;
    }

    const stocksHtml = filteredStocks.map(stock => `
      <tr>
        <td>
          <div class="stock-name">${stock.name}</div>
          <div style="font-size: 12px; color: var(--gray-500);">${stock.symbol}</div>
        </td>
        <td class="stock-price">${formatCurrency(stock.price)}</td>
        <td class="stock-change ${stock.change >= 0 ? 'up' : 'down'}">
          ${stock.change >= 0 ? '+' : ''}${stock.change}%
        </td>
        <td class="stock-volume">${formatNumber(stock.volume)}</td>
        <td>${formatMarketCap(stock.marketCap)}</td>
      </tr>
    `).join('');

    stocksTableBody.innerHTML = stocksHtml;
  }

  // 필터링 함수
  function filterStocks(filter) {
    currentFilter = filter;

    // 필터 버튼 상태 업데이트
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');

    renderStocks();
  }

  // 통화 포맷팅
  function formatCurrency(amount) {
    return '₩' + amount.toLocaleString();
  }

  // 숫자 포맷팅
  function formatNumber(num) {
    if (num >= 100000000) {
      return (num / 100000000).toFixed(1) + '억';
    } else if (num >= 10000) {
      return (num / 10000).toFixed(1) + '만';
    }
    return num.toLocaleString();
  }

  // 시가총액 포맷팅
  function formatMarketCap(cap) {
    if (cap >= 1000000000000) {
      return (cap / 1000000000000).toFixed(1) + '조';
    } else if (cap >= 100000000) {
      return (cap / 100000000).toFixed(1) + '억';
    }
    return cap.toLocaleString();
  }

</script>

</body>

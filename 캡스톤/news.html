<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 뉴스 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .market-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .market-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--navy));
    padding: 40px 0;
    border-bottom: 1px solid rgba(79, 158, 255, 0.15);
  }

  .market-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .market-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .market-sub {
    font-size: 16px;
    color: var(--gray-400);
  }

  .market-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .indices-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .indices-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .indices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .index-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(79, 158, 255, 0.1);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
  }

  .index-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 12px;
  }

  .index-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .index-change {
    font-size: 16px;
    font-weight: 600;
  }

  .index-change.up {
    color: var(--up);
  }

  .index-change.down {
    color: var(--down);
  }

  .stocks-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .stocks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .stocks-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
  }

  .stocks-filter {
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    padding: 8px 16px;
    background: rgba(79, 158, 255, 0.1);
    border: 1px solid rgba(79, 158, 255, 0.2);
    border-radius: 20px;
    color: var(--gray-200);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-btn:hover {
    background: rgba(79, 158, 255, 0.2);
    border-color: rgba(79, 158, 255, 0.4);
  }

  .stocks-table {
    width: 100%;
    border-collapse: collapse;
  }

  .stocks-table th,
  .stocks-table td {
    padding: 16px 12px;
    text-align: left;
    border-bottom: 1px solid rgba(79, 158, 255, 0.1);
  }

  .stocks-table th {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stocks-table td {
    font-size: 15px;
    color: var(--white);
  }

  .stock-name {
    font-weight: 600;
    color: var(--white);
  }

  .stock-price {
    font-weight: 700;
    color: var(--accent);
  }

  .stock-change {
    font-weight: 600;
  }

  .stock-change.up {
    color: var(--up);
  }

  .stock-change.down {
    color: var(--down);
  }

  .stock-volume {
    color: var(--gray-200);
  }

  .market-news {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    scroll-margin-top: 90px;
  }

  .news-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 24px;
  }

  .news-list {
    display: grid;
    gap: 16px;
  }

  .news-item {
    display: flex;
    gap: 16px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 12px;
    border: 1px solid rgba(79, 158, 255, 0.08);
    cursor: pointer;
    transition: all 0.2s;
  }

  .news-item.news-link {
    text-decoration: none;
    color: inherit;
  }

  .news-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .news-image {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    flex-shrink: 0;
  }

  .news-content {
    flex: 1;
  }

  .news-category {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .news-headline {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .news-summary {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.5;
  }

  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  .news-time {
    font-size: 12px;
    color: var(--gray-500);
  }

  .news-source {
    font-size: 12px;
    color: var(--gray-500);
    background: rgba(79, 158, 255, 0.1);
    padding: 4px 8px;
    border-radius: 12px;
  }

  .btn-back {
    background: rgba(79, 158, 255, 0.2);
    border: 1px solid rgba(79, 158, 255, 0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .btn-back:hover {
    background: rgba(79, 158, 255, 0.3);
    border-color: rgba(79, 158, 255, 0.6);
  }

  @media (max-width: 768px) {
    .stocks-table {
      font-size: 14px;
    }

    .stocks-table th,
    .stocks-table td {
      padding: 12px 8px;
    }

    .news-item {
      flex-direction: column;
      gap: 12px;
    }

    .news-image {
      width: 100%;
      height: 60px;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="주린닷컴홈피.html" class="nav-logo">
    <div class="logo-icon">주</div>
    <div class="logo-text">주린<span>닷컴</span></div>
  </a>
  <ul class="nav-menu">
    <li><a href="analysis.html">AI 분석</a></li>
    <li><a href="ai-chart-prediction.html">AI 차트 예측 <span class="nav-badge">AI</span></a></li>
    <li><a href="glossary.html">용어 검색</a></li>
    <li><a href="simulation.html">모의 투자</a></li>
    <li><a href="market.html">시장 <span class="nav-badge">📊</span></a></li>
  </ul>
  <div class="nav-right">
    <button type="button" class="btn-ghost" id="navLoginBtn">로그인</button>
    <button class="btn-primary">무료 시작하기</button>
  </div>
</nav>

<div class="market-container">
  <div class="market-header">
    <div class="market-header-content">
      <a href="주린닷컴홈피.html" class="btn-back">← 돌아가기</a>
      <div class="market-title">📰 경제 뉴스</div>
      <div class="market-sub">최신 경제 이슈와 시장 뉴스를 빠르게 확인하세요</div>
    </div>
  </div>

  <div class="market-content">
    <div class="market-news" id="marketNewsSection">
      <div class="news-title">📰 오늘의 경제 뉴스</div>
      <div class="news-list" id="newsList">
        <!-- 동적으로 뉴스 아이템 생성 -->
      </div>
    </div>
  </div>
</div>

<script>
  // 뉴스 데이터
  const newsData = [
    {
      category: '경제',
      headline: '반도체 슈퍼사이클 재개? 2025년 하반기 전망 분석',
      summary: '메모리 반도체 가격 상승과 AI 수요 증가로 반도체 업계에 새로운 성장 기회가 찾아올 전망입니다.',
      time: '2시간 전',
      source: '매일경제',
      link: 'https://www.mk.co.kr/news/economy/'
    },
    {
      category: '증권',
      headline: '개인 투자자들의 ETF 투자 증가세... "안정적 수익 추구"',
      summary: '코로나19 이후 개인 투자자들의 ETF 투자 비중이 크게 증가하며 안정적인 수익을 추구하는 투자 패턴이 확산되고 있습니다.',
      time: '4시간 전',
      source: '한국경제',
      link: 'https://www.hankyung.com/finance'
    },
    {
      category: '산업',
      headline: '전기차 시장 경쟁 심화... 현대차·기아의 대응 전략은?',
      summary: '글로벌 전기차 시장에서 현대차와 기아의 점유율 확대를 위한 기술 개발과 시장 전략에 대한 분석입니다.',
      time: '6시간 전',
      source: '아시아경제',
      link: 'https://www.asiae.co.kr/list/industry-IT'
    },
    {
      category: '금융',
      headline: '금리 인상 사이클 종료 임박... 주식시장에 미칠 영향은?',
      summary: '연준의 금리 정책 변화가 주식시장에 미칠 영향을 분석하고 투자 전략을 제시합니다.',
      time: '8시간 전',
      source: '서울경제',
      link: 'https://www.sedaily.com/NewsList/GA'
    },
    {
      category: '기술',
      headline: 'AI 투자 열풍... 관련주 주가 급등세 지속',
      summary: 'ChatGPT 이후 AI 관련 기업들의 주가가 급등하며 투자자들의 관심이 집중되고 있습니다.',
      time: '12시간 전',
      source: '전자신문',
      link: 'https://www.etnews.com/news/section.html?id1=02'
    }
  ];

  // 페이지 로드 시 초기화
  document.addEventListener('DOMContentLoaded', function() {
    renderNews();
  });

  // 뉴스 렌더링
  function renderNews() {
    const newsList = document.getElementById('newsList');

    const newsHtml = newsData.map(news => `
      <a class="news-item news-link" href="${news.link}" target="_blank" rel="noopener noreferrer">
        <div class="news-image">📰</div>
        <div class="news-content">
          <div class="news-category">${news.category}</div>
          <div class="news-headline">${news.headline}</div>
          <div class="news-summary">${news.summary}</div>
          <div class="news-meta">
            <div class="news-time">${news.time}</div>
            <div class="news-source">${news.source}</div>
          </div>
        </div>
      </a>
    `).join('');

    newsList.innerHTML = newsHtml;
  }

</script>
<script src="js/common-auth.js"></script>

</body>
</html>

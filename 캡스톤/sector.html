    line-height: 1.7;

  }

  function resolveSectorName(rawName) {
    const cleaned = (rawName || '').trim();
    if (!cleaned) return '';
    if (sectorData[cleaned]) return cleaned;
    if (cleaned === '의료·바이오' || cleaned === '의료바이오') return '의료바이오';
    return sectorAliases[cleaned] || cleaned;
  }

  function formatCurrency(value) {
    return '₩' + Number(value || 0).toLocaleString();
  }

  function formatNumber(value) {
    const n = Number(value || 0);
    if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
    if (n >= 10000) return (n / 10000).toFixed(1) + '만';
    return n.toLocaleString();
  }

  function renderStocksRows(stocks) {
    const body = document.getElementById('sectorStocksBody');
    if (!Array.isArray(stocks) || stocks.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px">표시할 종목이 없습니다.</td></tr>';
      return;
    }

    body.innerHTML = stocks.map((stock) => {
      if (stock.loading) {
        return `
          <tr>
            <td>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-code">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">시세 불러오는 중...</td>
          </tr>
        `;
      }

      if (stock.error && (stock.price === undefined || stock.price === null)) {
        return `
          <tr>
            <td>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-code">${stock.code}</div>
            </td>
            <td colspan="4" style="color:var(--gray-400)">조회 지연 (${stock.error})</td>
          </tr>
        `;
      }

      const dir = stock.direction || 'flat';
      const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '-');
      const sign = dir === 'up' ? '+' : (dir === 'down' ? '' : '±');
      const rate = Number(stock.rate || 0);
      const change = Math.abs(Number(stock.change || 0));

      return `
        <tr>
          <td>
            <div class="stock-name">${stock.name}</div>
            <div class="stock-code">${stock.code}</div>
          </td>
          <td class="stock-price">${formatCurrency(stock.price)}</td>
          <td class="stock-change ${dir}">${arrow} ${formatCurrency(change)}</td>
          <td class="stock-change ${dir}">${sign}${Math.abs(rate).toFixed(2)}%</td>
          <td>${formatNumber(stock.volume)}${stock.stale ? ' (지연)' : ''}</td>
        </tr>
      `;
    }).join('');
  }

  async function fetchSectorPrices() {
    if (!selectedSector || !selectedSector.stocks || selectedSector.stocks.length === 0) return;

    const codes = selectedSector.stocks.map(s => s.code).join(',');
    const names = selectedSector.stocks.map(s => `${s.code}:${s.name}`).join('|');
    const dot = document.getElementById('liveDot');
    const status = document.getElementById('liveStatus');

    try {
      const url = `${BACKEND}/api/live-prices?codes=${encodeURIComponent(codes)}&names=${encodeURIComponent(names)}&page=1&page_size=${selectedSector.stocks.length}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!data.success) throw new Error(data.message || '조회 실패');

      dot.classList.remove('error');
      status.textContent = `${data.ts} 업데이트 (${data.count || 0}종목)`;
      renderStocksRows(data.stocks || []);
    } catch (err) {
      dot.classList.add('error');
      status.textContent = '연결 실패';
      console.warn('[sector live-prices]', err.message);
    }
  }

  function renderSectorPage() {
    const params = new URLSearchParams(window.location.search);
    const sectorName = resolveSectorName(params.get('name'));
    const data = sectorData[sectorName] || null;

    if (!sectorName || !data) {
      document.getElementById('sectorName').textContent = '선택한 섹터를 찾을 수 없습니다.';
      document.getElementById('sectorDesc').textContent = '시장 페이지로 돌아가서 관심 섹터 버튼을 다시 눌러주세요.';
      document.getElementById('sectorBadge').textContent = '⚠️ 잘못된 접근';
      document.getElementById('liveStatus').textContent = '대상 섹터 없음';
      renderStocksRows([]);
      return;
    }

    selectedSector = data;

    document.title = `${sectorName} 섹터 - 주린닷컴`;
    document.getElementById('sectorBadge').textContent = `${data.emoji} ${sectorName} 섹터`;
    document.getElementById('sectorName').textContent = `${sectorName} 섹터 브리핑`;
    document.getElementById('sectorDesc').textContent = data.desc;

    const keywordWrap = document.getElementById('sectorKeywords');
    keywordWrap.innerHTML = data.keywords.map(k => `<span class="sector-keyword">#${k}</span>`).join('');

    renderStocksRows(data.stocks.map(s => ({ ...s, loading: true })));
    fetchSectorPrices();
    if (pollHandle) clearInterval(pollHandle);
    pollHandle = setInterval(fetchSectorPrices, POLL_INTERVAL);
  }

  document.addEventListener('DOMContentLoaded', renderSectorPage);
</script>
</body>
</html>

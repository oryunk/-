<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종목 분석 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .analysis-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .analysis-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--navy));
    padding: 40px 0;
    border-bottom: 1px solid rgba(79, 158, 255, 0.15);
  }

  .analysis-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .analysis-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .analysis-sub {
    font-size: 16px;
    color: var(--gray-400);
  }

  .analysis-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .stock-input-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .input-label {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--white);
  }

  .input-group {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stock-input-field {
    flex: 1;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(79, 158, 255, 0.25);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--white);
    font-size: 15px;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .stock-input-field:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.08);
  }

  .stock-input-field::placeholder {
    color: var(--gray-400);
  }

  .btn-analyze {
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    border: none;
    color: white;
    padding: 14px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    border-radius: 10px;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .btn-analyze:hover {
    opacity: 0.9;
  }

  .btn-back {
    background: rgba(79, 158, 255, 0.2);
    border: 1px solid rgba(79, 158, 255, 0.4);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border-radius: 8px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 24px;
  }

  .btn-back:hover {
    background: rgba(79, 158, 255, 0.3);
    border-color: rgba(79, 158, 255, 0.6);
  }

  .analysis-result {
    margin-top: 40px;
    min-height: 300px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(79, 158, 255, 0.1);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-400);
  }

  .analysis-result.loading {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .result-placeholder {
    text-align: center;
  }

  .result-placeholder-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .result-placeholder-text {
    font-size: 15px;
    color: var(--gray-400);
  }
</style>
</head>
<body>

<nav>
  <a href="주린닷컴홈피.html" class="nav-logo">
    <div class="logo-icon">주</div>
    <div class="logo-text">주린<span>닷컴</span></div>
  </a>
  <ul class="nav-menu">
    <li><a href="analysis.html" class="active">AI 분석 <span class="nav-badge">AI</span></a></li>
    <li><a href="ai-chart-prediction.html">AI 차트 예측 <span class="nav-badge">AI</span></a></li>
    <li><a href="glossary.html">용어 검색</a></li>
    <li><a href="simulation.html">모의 투자</a></li>
    <li><a href="market.html">시장</a></li>
  </ul>
  <div class="nav-right">
    <button type="button" class="btn-ghost" id="navLoginBtn">로그인</button>
    <button class="btn-primary">무료 시작하기</button>
  </div>
</nav>

<div class="analysis-container">
  <div class="analysis-header">
    <div class="analysis-header-content">
      <a href="주린닷컴홈피.html" class="btn-back">← 돌아가기</a>
      <div class="analysis-title">📊 종목 분석</div>
      <div class="analysis-sub">AI를 활용하여 종목을 분석해보세요</div>
    </div>
  </div>

  <div class="analysis-content">
    <div class="stock-input-section">
      <div class="input-label">분석할 종목을 입력하세요</div>
      <div class="input-group">
        <input 
          type="text" 
          id="analysisStockInput" 
          class="stock-input-field" 
          placeholder="종목명을 입력하세요 (예: 삼성전자, AAPL, TSLA...)" 
        />
        <button class="btn-analyze" onclick="performAnalysis()">분석하기</button>
      </div>
    </div>

    <div class="analysis-result" id="resultContainer">
      <div class="result-placeholder">
        <div class="result-placeholder-icon">🔍</div>
        <div class="result-placeholder-text">종목을 입력하고 분석하기를 눌러주세요</div>
      </div>
    </div>
  </div>
</div>

<script>
  // AI 분석 함수
  async function performAnalysis() {
    const stockName = document.getElementById('analysisStockInput').value.trim();
    
    if (!stockName) {
      alert('종목명을 입력해주세요.');
      return;
    }
    
    const resultContainer = document.getElementById('resultContainer');
    resultContainer.classList.add('loading');
    resultContainer.innerHTML = `
      <div class="result-placeholder">
        <div class="result-placeholder-icon">⏳</div>
        <div class="result-placeholder-text">분석 중입니다...</div>
      </div>
    `;
    
    try {
      // Flask 백엔드 API 호출
      const response = await fetch('http://localhost:5000/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stock_name: stockName })
      });
      
      if (!response.ok) {
        throw new Error(`API 오류: ${response.statusText}`);
      }
      
      const data = await response.json();
      resultContainer.classList.remove('loading');
      
      if (data.success) {
        // AI 분석 결과 표시
        const opinionColor = {
          '강력매수': '#00D084',
          '매수': '#4F9EFF',
          '보유': '#FFB800',
          '약세': '#FF6B6B'
        };
        
        const opinionBg = {
          '강력매수': 'rgba(0, 208, 132, 0.1)',
          '매수': 'rgba(79, 158, 255, 0.1)',
          '보유': 'rgba(255, 184, 0, 0.1)',
          '약세': 'rgba(255, 107, 107, 0.1)'
        };
        
        const color = opinionColor[data.opinion] || '#4F9EFF';
        const bg = opinionBg[data.opinion] || 'rgba(79, 158, 255, 0.05)';
        
        resultContainer.innerHTML = `
          <div style="width: 100%; color: var(--white);">
            <h3 style="margin-bottom: 20px; font-size: 20px;">📈 ${data.stock_name} 분석 결과</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
              <div style="background: rgba(79, 158, 255, 0.1); padding: 16px; border-radius: 10px;">
                <div style="color: var(--gray-400); font-size: 13px; margin-bottom: 8px;">현재가</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--white);">${Number(data.current_price).toLocaleString()}원</div>
                <div style="font-size: 14px; margin-top: 6px;">
                  <span style="color: ${data.change_rate >= 0 ? '#00D084' : '#FF6B6B'};">
                    ${data.change_rate >= 0 ? '▲' : '▼'} ${Math.abs(data.change_rate).toFixed(2)}%
                  </span>
                </div>
              </div>
              
              <div style="background: ${bg}; padding: 16px; border-radius: 10px; border: 1px solid ${color};">
                <div style="color: var(--gray-400); font-size: 13px; margin-bottom: 8px;">AI 투자의견</div>
                <div style="font-size: 24px; font-weight: 700; color: ${color};">${data.opinion}</div>
                <div style="font-size: 13px; margin-top: 6px; color: var(--gray-300);">
                  목표가: ${Number(data.target_price).toLocaleString()}원
                </div>
              </div>
            </div>

            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(79, 158, 255, 0.15); border-radius: 12px; padding: 20px; margin-bottom: 20px; font-size: 14px; line-height: 1.8; color: var(--gray-200); white-space: pre-wrap;">
              ${data.summary}
            </div>

            ${data.gemini_analysis ? `
            <div style="background: rgba(79, 158, 255, 0.03); border: 1px solid rgba(79, 158, 255, 0.25); border-radius: 12px; padding: 24px;">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                <span style="font-size: 18px;">🤖</span>
                <span style="font-size: 16px; font-weight: 700; color: var(--white);">Quantum Leap AI 분석</span>
                <span style="font-size: 11px; color: var(--accent); background: rgba(79,158,255,0.15); padding: 2px 8px; border-radius: 20px;">GEMINI v7.4</span>
              </div>
              <div style="font-size: 14px; line-height: 2; color: var(--gray-200); white-space: pre-wrap;">${data.gemini_analysis}</div>
            </div>
            ` : ''}
          </div>
        `;
      } else {
        resultContainer.innerHTML = `
          <div class="result-placeholder">
            <div class="result-placeholder-icon">⚠️</div>
            <div class="result-placeholder-text">${data.message}</div>
          </div>
        `;
      }
      
    } catch (error) {
      resultContainer.classList.remove('loading');
      console.error('분석 오류:', error);
      resultContainer.innerHTML = `
        <div class="result-placeholder">
          <div class="result-placeholder-icon">❌</div>
          <div class="result-placeholder-text">
            분석 중 오류가 발생했습니다.<br>
            <span style="font-size: 12px; color: var(--gray-500); margin-top: 8px; display: block;">
              ${error.message || '백엔드 서버가 실행 중인지 확인해주세요.'}
            </span>
          </div>
        </div>
      `;
    }
  }
  
  // 엔터 키로도 분석 실행 가능
  document.getElementById('analysisStockInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      performAnalysis();
    }
  });
</script>
<script src="js/common-auth.js"></script>

</body>
</html>

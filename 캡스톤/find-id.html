<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디 찾기 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .helper-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(circle at top right, rgba(79, 158, 255, 0.18), transparent 30%),
      radial-gradient(circle at bottom left, rgba(0, 212, 255, 0.12), transparent 35%),
      var(--navy);
  }

  .helper-card {
    width: min(100%, 480px);
    padding: 36px;
    border-radius: 24px;
    border: 1px solid rgba(79, 158, 255, 0.2);
    background: rgba(13, 31, 60, 0.94);
    box-shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
  }

  .helper-card h1 {
    font-size: 30px;
    margin-bottom: 10px;
  }

  .helper-card p {
    color: var(--gray-400);
    line-height: 1.7;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .helper-card label {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    color: var(--gray-200);
    font-size: 13px;
    font-weight: 600;
  }

  .helper-card input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid rgba(79, 158, 255, 0.22);
    background: rgba(255, 255, 255, 0.04);
    color: var(--white);
    font-size: 14px;
    font-family: inherit;
  }

  .helper-card button {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--blue-bright), var(--accent));
    color: var(--white);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="helper-page">
  <div class="helper-card">
    <h1>아이디 찾기</h1>
    <p>회원가입할 때 등록한 이메일을 입력하면 해당 이메일로 등록된 아이디를 찾는 절차를 진행할 수 있습니다.</p>
    <form onsubmit="event.preventDefault(); alert('아이디 찾기 기능은 현재 준비 중입니다.');">
      <label>
        가입 이메일
        <input type="email" placeholder="example@email.com" required>
      </label>
      <button type="submit">아이디 찾기</button>
    </form>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 차트 예측 - 주린닷컴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .chart-container {
    min-height: 100vh;
    padding-top: 80px;
  }

  .chart-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--navy));
    padding: 40px 0;
    border-bottom: 1px solid rgba(79, 158, 255, 0.15);
  }

  .chart-header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
  }

  .chart-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--white);
  }

  .chart-sub {
    font-size: 16px;
    color: var(--gray-400);
  }

  .chart-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
  }

  .stock-input-section {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }

  .input-group {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
  }

  .input-field {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid rgba(79, 158, 255, 0.2);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--white);
    font-size: 16px;
  }

  .input-field::placeholder {
    color: var(--gray-500);
  }

  .btn-predict {
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    color: var(--white);
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-predict:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(79, 158, 255, 0.3);
  }

  .chart-display {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(79, 158, 255, 0.15);
    border-radius: 16px;
    padding: 32px;
    min-height: 400px;
  }

  .chart-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--gray-500);
    font-size: 18px;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">
    <div class="logo-icon">주</div>
    <div class="logo-text">주린<span>닷컴</span></div>
  </a>
  <ul class="nav-menu">
    <li><a href="주린닷컴홈피.html">홈</a></li>
    <li><a href="analysis.html">AI 분석 <span class="nav-badge">AI</span></a></li>
    <li><a href="ai-chart-prediction.html" class="active">AI 차트 예측</a></li>
    <li><a href="glossary.html">용어 검색</a></li>
    <li><a href="simulation.html">모의 투자 <span class="nav-badge">NEW</span></a></li>
    <li><a href="market.html">시장</a></li>
  </ul>
  <div class="nav-right">
    <button class="btn-ghost">로그인</button>
    <button class="btn-primary">무료 시작하기</button>
  </div>
</nav>

<div class="chart-container">
  <div class="chart-header">
    <div class="chart-header-content">
      <div class="chart-title">AI 차트 예측</div>
      <div class="chart-sub">인공지능을 활용한 주식 차트 패턴 분석 및 미래 가격 예측</div>
    </div>
  </div>

  <div class="chart-content">
    <div class="stock-input-section">
      <div class="input-group">
        <input type="text" class="input-field" placeholder="종목명 또는 종목코드 입력 (예: 삼성전자, 005930)" id="stockInput">
        <button class="btn-predict" onclick="predictChart()">차트 예측하기</button>
      </div>
      <p style="color: var(--gray-400); font-size: 14px;">AI가 과거 데이터를 분석하여 차트 패턴을 예측합니다.</p>
    </div>

    <div class="chart-display">
      <div class="chart-placeholder" id="chartArea">
        📊 종목을 입력하고 예측 버튼을 클릭하세요
      </div>
    </div>
  </div>
</div>

<script src="js/ai.js"></script>
<script>
function predictChart() {
  const stockInput = document.getElementById('stockInput').value.trim();
  if (!stockInput) {
    alert('종목명을 입력해주세요.');
    return;
  }

  const chartArea = document.getElementById('chartArea');
  chartArea.innerHTML = '<div style="text-align: center; padding: 50px;"><div>🔄 AI가 차트를 분석하고 있습니다...</div><div style="margin-top: 20px;">예상 완료 시간: 3-5초</div></div>';

  // AI 예측 로직 (ai.js에서 구현)
  setTimeout(() => {
    // 임시 결과 표시
    chartArea.innerHTML = `
      <h3 style="color: var(--white); margin-bottom: 20px;">${stockInput} 차트 예측 결과</h3>
      <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <div style="color: var(--blue-light); font-size: 18px; margin-bottom: 10px;">📈 상승 확률: 68%</div>
        <div style="color: var(--gray-300);">예상 가격 범위: 75,000원 - 82,000원 (7일 후)</div>
      </div>
      <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px;">
        <div style="color: var(--white); font-weight: 500; margin-bottom: 10px;">AI 분석 요약:</div>
        <div style="color: var(--gray-300);">
          최근 거래량 증가와 함께 상승 추세가 관측됩니다. 기술적 지표상 매수 신호가 강하며, 단기적으로 상승 가능성이 높습니다.
        </div>
      </div>
    `;
  }, 2000);
}
</script>

</body>
</html>
